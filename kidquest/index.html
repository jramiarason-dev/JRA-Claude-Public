<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>KidQuest — L'aventure du savoir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* style.css — KidQuest video-game refresh.
   Uses JRA tokens from tokens.css and a custom layer on top. */

/* ════════════════════════════════════════════════════════════════
   JRA Studio — Design Tokens
   Colors, type, spacing, radii, shadows for the 5 JRA products:
   AuditIQ · KidQuest Academy · CoachIQ · PhotoPost AI · Audit Report deck
   ════════════════════════════════════════════════════════════════ */

/* ── Webfonts (all four are Google Fonts; loaded via CDN) ──────── */
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap");

:root {
  /* ─── BASE PALETTE ────────────────────────────────────────────
     The whole portfolio is dark-first. There's no "light mode"
     except in KidQuest (which has both). Greys all sit between
     near-black and off-white with a faint cool tint. */
  --jra-black:        #07090f;   /* deepest — AuditIQ report bg */
  --jra-ink:          #080808;   /* CoachIQ bg */
  --jra-ink-2:        #080b12;   /* AuditIQ app bg */
  --jra-ink-3:        #0e0e0e;   /* CoachIQ sidebar */
  --jra-ink-4:        #0f0f13;   /* PhotoPost bg */
  --jra-coal:         #111111;   /* CoachIQ card */
  --jra-coal-2:       #141414;   /* CoachIQ button bg */
  --jra-graphite:     #1a1a24;   /* PhotoPost surface */
  --jra-graphite-2:   #22223a;   /* PhotoPost surface-2 */
  --jra-line:         #1e1e1e;   /* CoachIQ border */
  --jra-line-soft:    rgba(255,255,255,.07);
  --jra-line-softer:  rgba(255,255,255,.05);

  /* Text */
  --jra-text:         #f0f0f0;   /* CoachIQ / PhotoPost primary */
  --jra-text-2:       #e8edf8;   /* AuditIQ primary */
  --jra-text-3:       #eef0f8;   /* presentation primary */
  --jra-muted:        #7b7a8e;   /* PhotoPost muted */
  --jra-muted-2:      #5a6488;   /* AuditIQ muted */
  --jra-muted-3:      #8392bb;   /* AuditIQ label */
  --jra-faint:        #424d72;   /* AuditIQ sub-label */

  /* ─── BRAND ACCENTS (one signature per product) ───────────────
     These are the colors a user immediately recognises as
     "that JRA app". Use them sparingly — one per surface. */
  --auditiq-blue:        #4f7ef8;   /* AuditIQ primary */
  --auditiq-blue-deep:   #2d54d4;   /* AuditIQ gradient end */
  --auditiq-blue-soft:   #7fa8fb;   /* AuditIQ download link */
  --auditiq-indigo:      #6366f1;   /* Presentation accent */
  --auditiq-indigo-soft: #818cf8;   /* Presentation accent-2 */

  --coachiq-lime:        #CAFF33;   /* CoachIQ primary — THE color */
  --coachiq-lime-hot:    #d8ff5a;   /* CoachIQ hover */
  --coachiq-lime-deep:   #90ee2a;   /* CoachIQ gradient end */

  --photopost-violet:    #7c6ef5;   /* PhotoPost primary */
  --photopost-violet-2:  #a78bfa;   /* PhotoPost accent-2 */
  --photopost-violet-dk: #1e1b4b;   /* PhotoPost header start */
  --photopost-violet-dk2:#312e81;   /* PhotoPost header mid */

  --kidquest-orange:     #FF6B35;   /* KidQuest primary */
  --kidquest-orange-2:   #FF8E53;   /* KidQuest gradient end */
  --kidquest-yellow:     #FFD93D;   /* KidQuest highlight */
  --kidquest-teal:       #4ECDC4;   /* KidQuest secondary */
  --kidquest-teal-2:     #44A9C6;
  --kidquest-mint:       #A8E6CF;   /* KidQuest tertiary */
  --kidquest-mint-2:     #56C596;
  --kidquest-purple:     #667eea;   /* KidQuest "I don't know" */
  --kidquest-purple-2:   #764ba2;
  --kidquest-pink:       #f093fb;
  --kidquest-pink-2:     #f5576c;

  /* ─── SEMANTIC STATUS ─────────────────────────────────────────
     Used across audit reports, math feedback, sports score deltas.
     The same hue lives in multiple shades depending on context. */
  --jra-red:        #ef4444;   /* critique / wrong */
  --jra-red-soft:   #f87171;
  --jra-red-page:   #fca5a5;   /* readable on dark */
  --jra-orange:     #f97316;   /* élevé */
  --jra-orange-soft:#fdba74;
  --jra-yellow:     #eab308;   /* moyen */
  --jra-yellow-soft:#fde047;
  --jra-green:      #22c55e;   /* faible / ok */
  --jra-green-soft: #86efac;
  --jra-green-2:    #22d3a5;   /* AuditIQ status */
  --jra-green-3:    #34d399;   /* PhotoPost ok */
  --jra-blue:       #60a5fa;   /* info */
  --jra-blue-soft:  #93c5fd;

  /* ─── TYPOGRAPHY ──────────────────────────────────────────────
     Four families, one per product personality.
     - Inter: default body & UI. AuditIQ + CoachIQ body.
     - Bebas Neue: CoachIQ display only — scoreboards, section titles.
     - Fredoka: KidQuest display & body (was "Fredoka One" originally,
       now using the variable Fredoka family which covers the same weight).
     - Nunito: KidQuest fallback / secondary body.
     - Segoe UI / system stack: fallback used by the older Streamlit
       apps before custom fonts landed. */
  --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-display: 'Bebas Neue', 'Inter', sans-serif;
  --font-fun:     'Fredoka', 'Nunito', 'Comic Sans MS', cursive;
  --font-system:  'Segoe UI', system-ui, -apple-system, sans-serif;

  /* Type scale — semantic */
  --t-display:   clamp(2rem, 5vw, 3.4rem);   /* hero / cover */
  --t-h1:        clamp(1.5rem, 3vw, 2rem);   /* page title */
  --t-h2:        clamp(1.3rem, 3vw, 1.9rem); /* section title */
  --t-h3:        1.2rem;                     /* sub-section */
  --t-body:      0.95rem;                    /* prose */
  --t-ui:        0.85rem;                    /* buttons, controls */
  --t-small:     0.75rem;                    /* meta, hints */
  --t-tiny:      0.7rem;                     /* labels / badges */

  --lh-tight:    1.15;
  --lh-snug:     1.4;
  --lh-normal:   1.6;
  --lh-loose:    1.75;

  /* ─── SPACING ─────────────────────────────────────────────────
     Loose 4-px grid. Most components use s-3 / s-4 padding. */
  --s-1: 0.25rem; --s-2: 0.5rem;  --s-3: 0.75rem; --s-4: 1rem;
  --s-5: 1.25rem; --s-6: 1.5rem;  --s-7: 1.75rem; --s-8: 2rem;
  --s-10: 2.5rem; --s-12: 3rem;

  /* ─── RADII ───────────────────────────────────────────────────
     A consistent step ladder. KidQuest cards lean to 22px.
     Audit / Coach cards are 10–14px. Pills are 20px+. */
  --r-xs:  6px;
  --r-sm:  8px;
  --r-md:  10px;   /* CoachIQ tabs, AuditIQ buttons */
  --r-lg:  14px;   /* Audit presentation cards */
  --r-xl:  16px;   /* PhotoPost cards */
  --r-2xl: 22px;   /* KidQuest q-cards */
  --r-pill: 9999px;

  /* ─── SHADOWS / GLOWS ─────────────────────────────────────────
     Dark UIs use accent-colored glows more than soft drop shadows.
     The grey-on-grey shadow exists but is rarely visible. */
  --shadow-card:   0 8px 32px rgba(0,0,0,.45);   /* PhotoPost card */
  --shadow-soft:   0 6px 18px rgba(0,0,0,.09);   /* KidQuest light */
  --shadow-lift:   0 4px 20px rgba(124,110,245,.35);  /* PhotoPost btn */
  --shadow-lift-2: 0 8px 28px rgba(124,110,245,.5);
  --glow-lime:     0 0 12px rgba(202,255,51,.15);     /* CoachIQ hover */
  --glow-lime-2:   0 0 18px rgba(202,255,51,.4);      /* CoachIQ active */
  --glow-lime-3:   0 0 24px rgba(202,255,51,.15);     /* CoachIQ selected */
  --glow-blue:     0 0 0 3px rgba(79,126,248,.08);    /* AuditIQ focus */
  --glow-card:     0 8px 22px rgba(0,0,0,.18);

  /* ─── GRADIENTS ───────────────────────────────────────────────
     Three signature patterns used throughout: */
  --grad-auditiq:    linear-gradient(135deg, #2d54d4 0%, #4f7ef8 100%);
  --grad-coachiq:    linear-gradient(135deg, #CAFF33, #90ee2a);
  --grad-photopost:  linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  --grad-photopost-btn: linear-gradient(135deg, #7c6ef5, #60a5fa);
  --grad-kidquest-title: linear-gradient(135deg, #FF6B35, #FFD93D, #4ECDC4);
  --grad-kidquest-orange: linear-gradient(135deg, #FF6B35, #FF8E53);
  --grad-kidquest-teal:   linear-gradient(135deg, #4ECDC4, #44A9C6);
  --grad-kidquest-mint:   linear-gradient(135deg, #A8E6CF, #56C596);
  --grad-kidquest-purple: linear-gradient(135deg, #667eea, #764ba2);
  --grad-kidquest-pink:   linear-gradient(135deg, #f093fb, #f5576c);
  --grad-text-cool:  linear-gradient(130deg, #fff 30%, #818cf8 100%);
  --grad-text-warm:  linear-gradient(135deg, #FF6B35, #FFD93D, #4ECDC4);

  /* ─── MOTION ─────────────────────────────────────────────── */
  --ease:           cubic-bezier(.4, 0, .2, 1);
  --dur-fast:       150ms;
  --dur:            250ms;
  --dur-slow:       550ms;
  --dur-glacial:    1200ms;   /* gauge / counter sweeps */
}


/* ════════════════════════════════════════════════════════════════
   SEMANTIC ELEMENT STYLES
   Importing colors_and_type.css gives you the variables AND these
   default-styled elements so prose / forms look consistent.
   ════════════════════════════════════════════════════════════════ */

body {
  background: var(--jra-ink-2);
  color: var(--jra-text);
  font-family: var(--font-sans);
  line-height: var(--lh-normal);
  font-size: var(--t-body);
}

h1, .h1 {
  font-family: var(--font-sans);
  font-size: var(--t-h1);
  font-weight: 700;
  letter-spacing: -0.4px;
  line-height: var(--lh-tight);
  color: var(--jra-text-2);
}
h2, .h2 {
  font-family: var(--font-sans);
  font-size: var(--t-h2);
  font-weight: 800;
  line-height: var(--lh-tight);
  color: var(--jra-text-2);
}
h3, .h3 {
  font-size: var(--t-h3);
  font-weight: 700;
  color: var(--jra-text-2);
}

p, .body {
  font-size: var(--t-body);
  color: var(--jra-text);
  line-height: var(--lh-normal);
}

small, .small  { font-size: var(--t-small); color: var(--jra-muted); }
.label         { font-size: var(--t-tiny); letter-spacing: 0.1em;
                 text-transform: uppercase; color: var(--jra-muted);
                 font-weight: 700; }

code, pre, .mono {
  font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 0.85em;
}

/* Hero / display — used by KidQuest title & AuditIQ presentation cover */
.display-warm {
  font-family: var(--font-fun);
  font-size: var(--t-display);
  background: var(--grad-text-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: var(--lh-tight);
}
.display-cool {
  font-family: var(--font-sans);
  font-size: var(--t-display);
  font-weight: 900;
  background: var(--grad-text-cool);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: var(--lh-tight);
}
.display-stadium {
  font-family: var(--font-display);
  letter-spacing: 0.04em;
  font-size: clamp(2.5rem, 6vw, 4rem);
  color: var(--jra-text);
}

/* Standard form field — Audit pattern */
.field {
  background: #10141f;
  border: 1px solid var(--jra-line-soft);
  border-radius: var(--r-sm);
  color: var(--jra-text-2);
  font-size: var(--t-ui);
  padding: 0.6rem 0.85rem;
  font-family: var(--font-sans);
  width: 100%;
}
.field:focus {
  outline: none;
  border-color: rgba(79,126,248,.5);
  box-shadow: var(--glow-blue);
}


* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

:root {
  /* runtime palette — driven by Tweaks */
  --kq-primary: #FF6B35;
  --kq-primary-deep: #FF8E53;
  --kq-soft: #FFD93D;
  --kq-bg: #FFF6E8;          /* light mode page */
  --kq-bg-2: #FFE9C8;
  --kq-surface: #FFFFFF;
  --kq-ink: #2A1F1F;
  --kq-ink-soft: #6B6068;
  --kq-line: #2A1F1F;
  --kq-border-w: 3px;
  --kq-shadow-y: 5px;
}

[data-dark="true"] {
  --kq-bg: #15102A;
  --kq-bg-2: #1f1a3a;
  --kq-surface: #221d3c;
  --kq-ink: #FEFCEC;
  --kq-ink-soft: #B0A8C0;
  --kq-line: #FEFCEC;
  --kq-border-w: 3px;
  --kq-shadow-y: 4px;
}

body {
  font-family: var(--font-fun);
  background: var(--kq-bg);
  color: var(--kq-ink);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

/* ── App shell ───────────────────────────────────────────────────── */
.kq-app {
  position: relative;
  max-width: 1240px;
  margin: 0 auto;
  padding: 18px 24px 120px;
  min-height: 100vh;
}

/* Sticky topbar */
.kq-topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.kq-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 26px;
  color: var(--kq-ink);
}
.kq-brand .logo {
  width: 44px; height: 44px;
  background: var(--kq-primary);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 14px;
  display: grid; place-items: center;
  font-size: 22px;
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
  transform: rotate(-4deg);
}
.kq-brand .name b { color: var(--kq-primary); }

.kq-topbar-spacer { flex: 1; min-width: 0; }

/* HUD widgets (stars, streak, profile) */
.kq-hud {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.kq-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: var(--font-fun);
  font-weight: 600;
  font-size: 16px;
  color: var(--kq-ink);
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
  white-space: nowrap;
}
.kq-chip.gold   { background: var(--kq-soft); }
.kq-chip.fire   { background: #FF6B6B; color: #FEFCEC; }
.kq-chip.purple { background: #A78BFA; color: #FEFCEC; }
.kq-chip.teal   { background: #4ECDC4; color: var(--kq-ink); }
.kq-chip .emoji { font-size: 18px; }
.kq-chip strong { font-weight: 800; }

/* Language pill */
.kq-lang {
  display: inline-flex;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  padding: 3px;
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
}
.kq-lang button {
  background: transparent; border: 0;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 14px;
  padding: 5px 12px;
  border-radius: 999px;
  color: var(--kq-ink-soft);
}
.kq-lang button[data-active="true"] {
  background: var(--kq-soft);
  color: var(--kq-ink);
}

/* Profile pill */
.kq-profile-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  padding: 4px 14px 4px 4px;
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
  font-family: var(--font-fun);
  font-weight: 600;
  font-size: 15px;
  color: var(--kq-ink);
  cursor: pointer;
}
.kq-profile-pill .av {
  width: 30px; height: 30px;
  background: var(--kq-primary);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 18px;
}

/* ── Buttons ─────────────────────────────────────────────────────── */
.kq-btn {
  appearance: none; border: 0;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 18px;
  padding: 12px 22px;
  border-radius: 16px;
  border: var(--kq-border-w) solid var(--kq-line);
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
  background: var(--kq-surface);
  color: var(--kq-ink);
  transition: transform .12s var(--ease), box-shadow .12s var(--ease);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  white-space: nowrap;
}
.kq-btn:hover { transform: translateY(-2px); box-shadow: 0 calc(var(--kq-shadow-y) + 2px) 0 var(--kq-line); }
.kq-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--kq-line); }
.kq-btn:disabled {
  opacity: .45; cursor: not-allowed;
  transform: none; box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
}
.kq-btn-primary { background: var(--kq-primary); color: #FEFCEC; }
.kq-btn-gold    { background: var(--kq-soft); color: var(--kq-ink); }
.kq-btn-teal    { background: #4ECDC4; color: var(--kq-ink); }
.kq-btn-purple  { background: #A78BFA; color: #FEFCEC; }
.kq-btn-ghost   { background: transparent; }
.kq-btn-big {
  font-size: 22px;
  padding: 16px 32px;
  border-radius: 22px;
}
.kq-btn-icon {
  width: 48px; height: 48px; padding: 0;
  border-radius: 50%;
}

/* ── Cards (KidQuest signature: thick border + offset shadow) ──── */
.kq-card {
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 6px 0 var(--kq-line);
  position: relative;
}
.kq-card-tight { padding: 16px; border-radius: 18px; }

/* ── Section title ───────────────────────────────────────────────── */
.kq-h1 {
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: clamp(26px, 4vw, 40px);
  line-height: 1.05;
  margin: 0 0 6px;
  color: var(--kq-ink);
  letter-spacing: -.5px;
}
.kq-h1.rainbow {
  background: linear-gradient(110deg, #FF6B35, #FFD93D, #4ECDC4, #A78BFA);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.kq-h2 {
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: clamp(20px, 2.4vw, 26px);
  margin: 0 0 4px;
  color: var(--kq-ink);
}
.kq-sub {
  color: var(--kq-ink-soft);
  font-size: 16px;
  margin: 0;
}

/* ── ONBOARDING ──────────────────────────────────────────────────── */
.kq-onboard {
  min-height: 78vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px; text-align: center;
  padding-top: 20px;
}
.kq-onboard .step-dots {
  display: flex; gap: 8px;
}
.kq-onboard .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--kq-line); opacity: 0.25;
  border: 2px solid var(--kq-line);
}
.kq-onboard .dot[data-active="true"] { opacity: 1; background: var(--kq-primary); }

.kq-onboard-mascot {
  filter: drop-shadow(0 8px 0 rgba(42,31,31,.18));
  animation: bobMascot 2.6s ease-in-out infinite;
}
@keyframes bobMascot {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50%     { transform: translateY(-10px) rotate(2deg); }
}

.kq-lang-row {
  display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
}
.kq-lang-row .kq-btn {
  font-size: 22px; padding: 16px 28px;
  min-width: 180px;
}
.kq-lang-row .flag { font-size: 28px; }

.kq-avatar-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 520px;
}
.kq-avatar-grid button {
  appearance: none; border: var(--kq-border-w) solid var(--kq-line);
  background: var(--kq-surface);
  width: 100%; aspect-ratio: 1;
  border-radius: 22px;
  font-size: 44px;
  display: grid; place-items: center;
  cursor: pointer;
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
  transition: transform .15s var(--ease);
  position: relative;
}
.kq-avatar-grid button:hover { transform: translateY(-3px); }
.kq-avatar-grid button[data-active="true"] {
  background: var(--kq-soft);
  transform: scale(1.06) rotate(-2deg);
}
.kq-avatar-grid button[data-active="true"]::after {
  content: "✓";
  position: absolute;
  top: -8px; right: -8px;
  width: 28px; height: 28px;
  background: #22c55e;
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 50%;
  color: #fff;
  display: grid; place-items: center;
  font-size: 16px;
  box-shadow: 0 3px 0 var(--kq-line);
}

.kq-input {
  appearance: none;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 24px;
  padding: 16px 22px;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 22px;
  color: var(--kq-ink);
  text-align: center;
  max-width: 320px;
  width: 100%;
  outline: none;
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
}
.kq-input:focus { background: var(--kq-soft); }

/* ── WORLD MAP ───────────────────────────────────────────────────── */
.kq-world {
  position: relative;
  padding: 14px 0 40px;
}
.kq-world-bg {
  position: absolute;
  inset: -40px -120px 0 -120px;
  background:
    radial-gradient(circle at 18% 30%, rgba(78,205,196,.35) 0%, transparent 38%),
    radial-gradient(circle at 80% 65%, rgba(255,217,61,.30) 0%, transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(167,139,250,.25) 0%, transparent 50%);
  z-index: -1;
}
[data-dark="true"] .kq-world-bg {
  background:
    radial-gradient(circle at 18% 30%, rgba(78,205,196,.20) 0%, transparent 38%),
    radial-gradient(circle at 80% 65%, rgba(255,142,83,.20) 0%, transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(167,139,250,.20) 0%, transparent 50%);
}
.kq-world h1 { text-align: center; }
.kq-world .sub { text-align: center; margin-bottom: 26px; }

.kq-islands {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
  max-width: 1100px;
  margin: 0 auto;
}
.kq-island {
  position: relative;
  background: var(--hub-bg);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 28px;
  padding: 28px 22px 26px;
  cursor: pointer;
  box-shadow: 0 8px 0 var(--kq-line);
  transition: transform .15s var(--ease), box-shadow .15s var(--ease);
  display: flex; flex-direction: column; align-items: center;
  min-height: 360px;
  overflow: hidden;
}
.kq-island:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 0 var(--kq-line);
}
.kq-island::before {
  /* Subtle dotted sparkle pattern */
  content: "";
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(255,255,255,.4) 0 3px, transparent 4px),
    radial-gradient(circle at 84% 32%, rgba(255,255,255,.3) 0 3px, transparent 4px),
    radial-gradient(circle at 30% 78%, rgba(255,255,255,.3) 0 3px, transparent 4px),
    radial-gradient(circle at 70% 88%, rgba(255,255,255,.4) 0 3px, transparent 4px);
  pointer-events: none;
}
.kq-island-mascot {
  margin-bottom: 12px;
  filter: drop-shadow(0 6px 0 rgba(42,31,31,.15));
  animation: bobMascot 3s ease-in-out infinite;
}
.kq-island-title {
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 28px;
  margin: 0;
  color: var(--kq-ink);
  text-align: center;
}
.kq-island-sub {
  font-size: 15px; color: var(--kq-ink); opacity: .75;
  margin: 4px 0 16px; text-align: center;
}
.kq-island-cta {
  margin-top: auto;
}
.kq-island-progress {
  width: 100%;
  background: rgba(42,31,31,.15);
  border-radius: 999px;
  height: 12px;
  border: 2px solid var(--kq-line);
  position: relative;
  margin-bottom: 12px;
  overflow: hidden;
}
.kq-island-progress > span {
  display: block; height: 100%;
  background: var(--kq-soft);
  border-right: 2px solid var(--kq-line);
}
.kq-island-meta {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 12px;
}
.kq-island-meta .kq-chip { font-size: 13px; padding: 4px 10px; box-shadow: 0 3px 0 var(--kq-line); }

/* ── QUEST MAP (per-hub levels) ──────────────────────────────────── */
.kq-quest {
  position: relative;
  padding: 0 0 40px;
}
.kq-quest-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.kq-back-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  box-shadow: 0 var(--kq-shadow-y) 0 var(--kq-line);
  display: grid; place-items: center;
  font-size: 22px;
  color: var(--kq-ink);
  font-family: var(--font-fun);
  font-weight: 700;
}
.kq-quest-hero {
  background: var(--hub-bg);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 28px;
  padding: 22px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 22px;
  margin-bottom: 26px;
  box-shadow: 0 6px 0 var(--kq-line);
}
.kq-quest-hero .who h1 {
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: clamp(24px, 3.5vw, 34px);
  margin: 0;
}
.kq-quest-hero .who p { margin: 4px 0 8px; color: var(--kq-ink); opacity: .8; }
.kq-quest-hero .mascot { filter: drop-shadow(0 8px 0 rgba(42,31,31,.18)); }
.kq-quest-hero .stats {
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}

.kq-path {
  position: relative;
  max-width: 520px;
  margin: 0 auto;
  padding: 8px 0 40px;
}
/* zigzag dotted background road */
.kq-path::before {
  content: "";
  position: absolute;
  left: 50%; top: 60px; bottom: 60px;
  width: 6px;
  background-image: linear-gradient(to bottom, var(--kq-line) 0 14px, transparent 14px 28px);
  background-size: 6px 28px;
  transform: translateX(-50%);
  z-index: 0;
}
.kq-level {
  position: relative;
  z-index: 1;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 0;
}
.kq-level.right { flex-direction: row-reverse; }
.kq-level-node {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: var(--kq-border-w) solid var(--kq-line);
  background: var(--kq-surface);
  display: grid; place-items: center;
  position: relative;
  box-shadow: 0 8px 0 var(--kq-line);
  cursor: pointer;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 30px;
  color: var(--kq-ink);
  flex-shrink: 0;
  transition: transform .15s var(--ease), box-shadow .15s var(--ease);
}
.kq-level-node:hover { transform: translateY(-3px); box-shadow: 0 11px 0 var(--kq-line); }
.kq-level-node[data-status="done"]    { background: var(--hub-color); color: #FEFCEC; }
.kq-level-node[data-status="current"] {
  background: var(--kq-soft); color: var(--kq-ink);
  animation: levelPulse 1.6s ease-in-out infinite;
}
.kq-level-node[data-status="locked"]  { background: #d4d4d4; color: #888; cursor: default; }
[data-dark="true"] .kq-level-node[data-status="locked"] { background: #322b50; color: #6a6080; }
.kq-level-node[data-status="locked"]:hover { transform: none; box-shadow: 0 8px 0 var(--kq-line); }
.kq-level-node .boss-emoji { font-size: 38px; }
.kq-level-node .lock { font-size: 32px; }
@keyframes levelPulse {
  0%, 100% { box-shadow: 0 8px 0 var(--kq-line), 0 0 0 0 rgba(255,217,61,.7); }
  50%      { box-shadow: 0 8px 0 var(--kq-line), 0 0 0 14px rgba(255,217,61,0); }
}
.kq-level-stars {
  position: absolute;
  bottom: -14px; left: 50%; transform: translateX(-50%);
  background: var(--kq-surface);
  border: 2px solid var(--kq-line);
  border-radius: 999px;
  padding: 1px 8px;
  font-size: 12px;
  display: flex; gap: 1px;
  font-family: var(--font-fun);
  font-weight: 700;
}
.kq-level-info {
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 18px;
  padding: 10px 16px;
  box-shadow: 0 4px 0 var(--kq-line);
  font-family: var(--font-fun);
  font-weight: 600;
  font-size: 15px;
  color: var(--kq-ink);
  min-width: 0;
}
.kq-level-info .num { font-size: 12px; color: var(--kq-ink-soft); }
.kq-level-info .ttl { font-size: 16px; font-weight: 700; }

/* ── QUIZ ────────────────────────────────────────────────────────── */
.kq-quiz {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 0 40px;
}
.kq-quiz-bar {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.kq-progress {
  flex: 1;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  height: 22px;
  overflow: hidden;
}
.kq-progress > span {
  display: block; height: 100%;
  background: var(--hub-color, var(--kq-primary));
  border-right: 2px solid var(--kq-line);
  transition: width .35s var(--ease);
}
.kq-hearts { display: flex; gap: 4px; font-size: 20px; }
.kq-hearts span.empty { filter: grayscale(1); opacity: .35; }

.kq-question-card {
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 8px 0 var(--kq-line);
  text-align: center;
}
.kq-mascot-bubble {
  display: flex; align-items: flex-end; gap: 14px;
  justify-content: center;
  margin-bottom: 18px;
  text-align: left;
}
.kq-mascot-bubble .speech {
  background: var(--kq-soft);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 22px;
  padding: 14px 20px;
  font-family: var(--font-fun);
  font-weight: 600;
  font-size: 20px;
  color: var(--kq-ink);
  position: relative;
  max-width: 80%;
}
.kq-mascot-bubble .speech::after {
  content: ""; position: absolute;
  left: -16px; bottom: 22px;
  width: 18px; height: 18px;
  background: var(--kq-soft);
  border-left: var(--kq-border-w) solid var(--kq-line);
  border-bottom: var(--kq-border-w) solid var(--kq-line);
  transform: rotate(45deg);
}
.kq-question {
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: clamp(22px, 3vw, 30px);
  margin: 0 0 22px;
  text-wrap: pretty;
}

.kq-options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.kq-option {
  appearance: none;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 22px;
  padding: 22px 14px;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 22px;
  color: var(--kq-ink);
  box-shadow: 0 5px 0 var(--kq-line);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  transition: transform .12s var(--ease), background .15s var(--ease);
}
.kq-option .emoji { font-size: 44px; line-height: 1; }
.kq-option:hover { transform: translateY(-3px); }
.kq-option[data-selected="true"] {
  background: var(--kq-soft);
  transform: scale(1.04);
}
.kq-option[data-state="correct"] {
  background: #6BCB77; color: #FEFCEC;
  animation: correctPop .5s var(--ease);
}
.kq-option[data-state="wrong"] {
  background: #FF6B6B; color: #FEFCEC;
  animation: shake .4s ease-in-out;
}
@keyframes correctPop {
  0% { transform: scale(.9); }
  60% { transform: scale(1.1); }
  100% { transform: scale(1.04); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px) rotate(-2deg); }
  60% { transform: translateX(8px) rotate(2deg); }
}

.kq-feedback {
  margin: 0 0 14px;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 22px;
}
.kq-feedback.good { color: #2A9D5C; }
.kq-feedback.bad  { color: #C44545; }

/* ── REWARD overlay ──────────────────────────────────────────────── */
.kq-reward {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(42,31,31,.55);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.kq-reward-card {
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 28px;
  padding: 36px 30px;
  box-shadow: 0 10px 0 var(--kq-line);
  max-width: 420px;
  width: 100%;
  text-align: center;
  position: relative;
  animation: popIn .45s var(--ease);
}
@keyframes popIn {
  0% { transform: scale(.6) rotate(-6deg); opacity: 0; }
  60% { transform: scale(1.08) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.kq-reward-stars {
  display: flex; justify-content: center; gap: 6px; margin: 12px 0 6px;
  font-size: 44px;
}
.kq-reward-stars .pop { animation: starPop .45s var(--ease) backwards; }
.kq-reward-stars .pop:nth-child(2) { animation-delay: .15s; }
.kq-reward-stars .pop:nth-child(3) { animation-delay: .3s; }
@keyframes starPop {
  0%   { transform: scale(0) rotate(-90deg); }
  60%  { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1)   rotate(0); }
}
.kq-reward-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--kq-soft);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  padding: 6px 14px;
  margin: 10px 0;
  font-weight: 700;
  font-size: 14px;
}

/* ── TROPHIES / COLLECTION ───────────────────────────────────────── */
.kq-trophies {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
}
.kq-trophy {
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 22px;
  padding: 18px 12px;
  box-shadow: 0 5px 0 var(--kq-line);
  text-align: center;
  position: relative;
}
.kq-trophy.locked { background: rgba(42,31,31,.05); filter: grayscale(.6); }
[data-dark="true"] .kq-trophy.locked { background: rgba(255,255,255,.04); }
.kq-trophy .emoji { font-size: 52px; line-height: 1; }
.kq-trophy.locked .emoji::after {
  content: "🔒";
  position: absolute; right: 10px; top: 10px;
  font-size: 20px;
}
.kq-trophy h4 { font-family: var(--font-fun); font-weight: 700; margin: 10px 0 4px; font-size: 16px; }
.kq-trophy p { font-size: 12px; color: var(--kq-ink-soft); margin: 0; line-height: 1.4; }

/* ── PROFILE ─────────────────────────────────────────────────────── */
.kq-profile-hero {
  background: linear-gradient(135deg, #FFD93D, #FF8E53);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 28px;
  padding: 26px;
  box-shadow: 0 8px 0 var(--kq-line);
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 22px;
  align-items: center;
  margin-bottom: 20px;
}
.kq-big-avatar {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  display: grid; place-items: center;
  font-size: 64px;
  box-shadow: 0 6px 0 var(--kq-line);
}
.kq-profile-hero h1 { margin: 0; font-size: clamp(28px, 4vw, 38px); }
.kq-profile-hero .sub { margin: 6px 0 12px; opacity: .9; }
.kq-profile-hero .chips { display: flex; gap: 8px; flex-wrap: wrap; }

.kq-stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.kq-stat {
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 4px 0 var(--kq-line);
  text-align: center;
}
.kq-stat .v {
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 32px;
  color: var(--kq-ink);
}
.kq-stat .l {
  font-size: 13px;
  color: var(--kq-ink-soft);
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
}

/* ── PARENT ZONE ─────────────────────────────────────────────────── */
.kq-parent {
  max-width: 720px; margin: 0 auto;
}
.kq-parent .lock-screen {
  text-align: center; padding: 60px 20px;
}
.kq-parent .pin-row {
  display: flex; justify-content: center; gap: 10px; margin: 20px 0;
}
.kq-parent .pin-row input {
  width: 60px; height: 70px;
  font-size: 28px; text-align: center;
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 16px;
  font-family: var(--font-fun); font-weight: 700;
  background: var(--kq-surface); color: var(--kq-ink);
  outline: none;
  box-shadow: 0 4px 0 var(--kq-line);
}

.kq-setting {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid rgba(42,31,31,.1);
}
.kq-setting:last-child { border-bottom: 0; }
[data-dark="true"] .kq-setting { border-bottom-color: rgba(255,255,255,.08); }
.kq-setting .label { font-weight: 600; font-size: 16px; }
.kq-setting .desc  { color: var(--kq-ink-soft); font-size: 13px; }
.kq-switch {
  width: 56px; height: 30px;
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  background: #d4d4d4;
  position: relative; cursor: pointer;
}
.kq-switch::after {
  content: ""; position: absolute;
  width: 20px; height: 20px;
  background: var(--kq-line);
  border-radius: 50%;
  top: 50%; transform: translateY(-50%);
  left: 3px;
  transition: left .15s var(--ease);
}
.kq-switch[data-on="true"] { background: #6BCB77; }
.kq-switch[data-on="true"]::after { left: calc(100% - 25px); }

.kq-seg {
  display: inline-flex;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  padding: 3px;
}
.kq-seg button {
  background: transparent; border: 0;
  font-family: var(--font-fun); font-weight: 700;
  font-size: 14px;
  padding: 6px 14px;
  border-radius: 999px;
  color: var(--kq-ink-soft);
}
.kq-seg button[data-active="true"] {
  background: var(--kq-primary); color: #FEFCEC;
}

/* ── Bottom tab bar (mobile/tablet primary nav) ──────────────────── */
.kq-tabs {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: 16px;
  background: var(--kq-surface);
  border: var(--kq-border-w) solid var(--kq-line);
  border-radius: 999px;
  box-shadow: 0 6px 0 var(--kq-line);
  padding: 4px;
  display: flex; gap: 2px;
  z-index: 20;
}
.kq-tabs button {
  appearance: none; border: 0;
  background: transparent;
  padding: 10px 18px;
  border-radius: 999px;
  font-family: var(--font-fun);
  font-weight: 700;
  font-size: 14px;
  color: var(--kq-ink-soft);
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.kq-tabs button[data-active="true"] {
  background: var(--kq-primary); color: #FEFCEC;
}
.kq-tabs button .emoji { font-size: 18px; }

/* ── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 880px) {
  .kq-app { padding: 12px 16px 120px; }
  .kq-islands { grid-template-columns: 1fr; }
  .kq-island { min-height: 280px; }
  .kq-quest-hero { grid-template-columns: 1fr; text-align: center; }
  .kq-quest-hero .stats { align-items: center; }
  .kq-avatar-grid { grid-template-columns: repeat(3, 1fr); }
  .kq-profile-hero { grid-template-columns: 1fr; text-align: center; }
  .kq-profile-hero .chips { justify-content: center; }
  .kq-options { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 520px) {
  .kq-tabs button { padding: 10px 12px; font-size: 12px; }
  .kq-tabs button span:not(.emoji) { display: none; }
  .kq-brand .name { font-size: 20px; }
}

/* ── Confetti dots (reward bg) ───────────────────────────────────── */

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

  <script type="text/babel" data-presets="react" data-name="screens">
// screens.jsx — All KidQuest screens
// Exposes: OnboardScreen, WorldMapScreen, QuestMapScreen, QuizScreen,
//          RewardOverlay, ProfileScreen, ParentScreen, BottomTabs, Topbar

var { useState, useEffect, useMemo } = React;

// ── helpers ──
const fmt = (s, vars) => Object.keys(vars || {}).reduce(
  (acc, k) => acc.replace(`{${k}}`, vars[k]), s);

const useT = (lang) => (key, vars) => fmt(window.KQ.i18n[lang][key] || key, vars);

const ConfettiBurst = () => (
  <div className="kq-confetti" aria-hidden="true">
    {[...Array(24)].map((_, i) => {
      const colors = ["#FF6B35","#FFD93D","#4ECDC4","#A78BFA","#FF99B6","#6BCB77"];
      const left = (i * 4.2) % 100;
      const delay = (i * 0.13).toFixed(2);
      const dur = 1.2 + (i % 4) * 0.4;
      const c = colors[i % colors.length];
      return <span key={i} style={{ left: `${left}%`, top: 0, animationDelay: `${delay}s`, "--c": c, "--d": `${dur}s` }} />;
    })}
  </div>
);

const Stars = ({ n, max = 3, size = 16 }) => (
  <span style={{ display: 'inline-flex', gap: 1, fontSize: size }}>

// ── BOTTOM TABS ──

// ── ONBOARDING ──
const OnboardScreen = ({ lang, setLang, onDone }) => {
  const t = useT(lang);
  const [step, setStep] = useState(0);
  const [avatar, setAvatar] = useState(null);
  const [name, setName] = useState("");

  const next = () => setStep(s => s + 1);
  const back = () => setStep(s => Math.max(0, s - 1));

  // 0 = welcome, 1 = avatar, 2 = name
  return (
    <div className="kq-onboard">
      <div className="step-dots">
        {[0,1,2].map(i => <span key={i} className="dot" data-active={step === i} />)}
      </div>

      {step === 0 && (
        <React.Fragment>
          <div className="kq-onboard-mascot">
            <window.OwlMascot size={150} accent="#4ECDC4" />
          </div>
          <h1 className="kq-h1 rainbow">{t('welcome')}</h1>
          <p className="kq-sub">{t('welcome_sub')}</p>
          <div className="kq-lang-row">
            <button className="kq-btn kq-btn-teal kq-btn-big"
                    data-active={lang === 'fr'}
                    onClick={() => { setLang('fr'); }}>
              <span className="flag">🇫🇷</span> Français
            </button>
            <button className="kq-btn kq-btn-purple kq-btn-big"
                    data-active={lang === 'en'}
                    onClick={() => { setLang('en'); }}>
              <span className="flag">🇬🇧</span> English
            </button>
          </div>
          <button className="kq-btn kq-btn-primary kq-btn-big" onClick={next}>
            {t('next')} →
          </button>
        </React.Fragment>
      )}

      {step === 1 && (
        <React.Fragment>
          <h1 className="kq-h1">{t('choose_avatar')}</h1>
          <p className="kq-sub">{t('choose_avatar_sub')}</p>
          <div className="kq-avatar-grid">
            {window.KQ.avatars.map(a => (
              <button key={a.id}
                      data-active={avatar?.id === a.id}
                      onClick={() => setAvatar(a)}>
                {a.emoji}
              </button>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <button className="kq-btn kq-btn-ghost" onClick={back}>← {t('back')}</button>
            <button className="kq-btn kq-btn-primary kq-btn-big"
                    disabled={!avatar}
                    onClick={next}>
              {t('next')} →
            </button>
          </div>
        </React.Fragment>
      )}

      {step === 2 && (
        <React.Fragment>
          <div className="kq-onboard-mascot">
            <window.FoxMascot size={130} accent={avatar?.color || "#A78BFA"} />
          </div>
          <h1 className="kq-h1">{t('whats_your_name')}</h1>
          <input className="kq-input"
                 maxLength={12}
                 value={name}
                 onChange={e => setName(e.target.value)}
                 placeholder={t('name_placeholder')}
                 autoFocus />
          <div style={{ display: 'flex', gap: 12 }}>
            <button className="kq-btn kq-btn-ghost" onClick={back}>← {t('back')}</button>
            <button className="kq-btn kq-btn-primary kq-btn-big"
                    disabled={!name.trim()}
                    onClick={() => onDone({ name: name.trim(), avatar })}>
              {t('lets_go')} 🚀
            </button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
};

// ── WORLD MAP ──

  const t = useT(lang);
  const totalStars = Object.values(progress).reduce((s, h) =>
    s + h.reduce((ss, l) => ss + l.stars, 0), 0);

  return (
    <section className="kq-world">
      <div className="kq-world-bg" />
      <h1 className="kq-h1 rainbow">{t('hello_name', { name: profile?.name || '' })}</h1>
      <p className="kq-sub sub">{t('choose_world')}</p>

      <div className="kq-islands" style={{ marginTop: 24 }}>
        {window.KQ.hubs.map((hub, i) => {
          const levels = progress[hub.id] || window.KQ.levels[hub.id];
          const done = levels.filter(l => l.status === 'done').length;
          const total = levels.length;
          const hubStars = levels.reduce((s, l) => s + l.stars, 0);
          const bgGrad = `linear-gradient(180deg, ${hub.colorSoft}, ${hub.color})`;
          return (
            <button key={hub.id}
                    className="kq-island"
                    style={{ "--hub-bg": bgGrad, "--hub-color": hub.color, animationDelay: `${i*.1}s` }}
                    onClick={() => onPickHub(hub.id)}>
              <div className="kq-island-mascot">
                <window.HubMascot hubId={hub.id} size={130} accent={hub.color} />

              <h2 className="kq-island-title">{t(hub.title_key)}</h2>
              <p className="kq-island-sub">{t(hub.sub_key)}</p>

              <div className="kq-island-meta">
                <span className="kq-chip"><span className="emoji">⭐</span><strong>{hubStars}</strong></span>
                <span className="kq-chip"><span className="emoji">📍</span><strong>{done}/{total}</strong></span>

              <div className="kq-island-progress">
                <span style={{ width: `${(done/total) * 100}%` }} />

              <div className="kq-island-cta">
                <span className="kq-btn kq-btn-primary">
                  {done === total ? t('replay') : t('play')} →
                </span>
              </div>
            </button>
          );
        })}
      </div>
    </section>
  );
};

// ── QUEST MAP ──
const QuestMapScreen = ({ lang, hubId, levels, profile, onBack, onPickLevel }) => {
  const t = useT(lang);
  const hub = window.KQ.hubs.find(h => h.id === hubId);
  const hubStars = levels.reduce((s, l) => s + l.stars, 0);
  const done = levels.filter(l => l.status === 'done').length;
  const bgGrad = `linear-gradient(135deg, ${hub.colorSoft}, ${hub.color})`;

  return (
    <section className="kq-quest">
      <div className="kq-quest-header">

        </div>

        <div className="who">

        <div className="stats">

      <div className="kq-path" style={{ "--hub-color": hub.color }}>
        {levels.map((lv, i) => {

                          paddingLeft: side === 'left' ? 8 : 0,
