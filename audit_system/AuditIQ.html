          </div>

          {/* Typical findings panel */}
          <div style={{marginBottom:14}}>
            <button onClick={()=>toggleSec('typical')} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.25)',borderRadius:8,cursor:'pointer',color:'#c4b5fd',fontSize:12,fontWeight:600}}>
              <span>★ {lang==='fr'?'Constats typiques — Banque privée':'Typical findings — Private banking'}</span>
              <span>{openSec['typical']?'▲':'▼'}</span>
            </button>
            {openSec['typical'] && (
              <div style={{padding:'10px 12px',background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.2)',borderTop:0,borderRadius:'0 0 8px 8px'}}>
                {findings.map((f,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'6px 0',borderBottom:i<findings.length-1?'1px solid var(--aiq-border)':0}}>
                    <span className={`aiq-pill aiq-pill-${sevCls(f.sev)}`} style={{fontSize:9,minWidth:52}}>{f.sev}</span>
                    <span style={{fontSize:12,color:'var(--aiq-text-2)'}}>{f[`title_${lang}`]}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="aiq-field">
            <label>{lang==='fr'?'Observations & constats':'Observations & findings'}</label>
            <textarea className="aiq-textarea" style={{minHeight:120}} placeholder={lang==='fr'?'Saisir les observations de l\'audit…':'Enter audit observations…'} value={observations} onChange={e=>setObservations(e.target.value)} />
          </div>
          <button className="aiq-btn aiq-btn-primary aiq-btn-lg" style={{width:'100%'}}
                  disabled={gen.busy} onClick={()=>gen.run(()=>setShowRevision(false))}>
            {gen.busy ? <React.Fragment><span className="aiq-spinner" style={{width:16,height:16,borderWidth:2}}/> {lang==='fr'?'Génération…':'Generating…'}</React.Fragment>
                      : <React.Fragment>📊 {lang==='fr'?'Générer le rapport':'Generate report'}</React.Fragment>}
          </button>
          {gen.done && (
            <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}}>
              <button className="aiq-btn aiq-btn-ghost aiq-btn-sm" style={{flex:1}}>📄 Word</button>
              <button className="aiq-btn aiq-btn-ghost aiq-btn-sm" style={{flex:1}}>📈 Excel</button>
              <button className="aiq-btn aiq-btn-ghost aiq-btn-sm" style={{flex:1}}>📊 PPT</button>
            </div>
          )}
          {gen.done && (
            <div style={{marginTop:12}}>
              <button className="aiq-btn aiq-btn-ghost" style={{width:'100%',fontSize:12}} onClick={()=>setShowRevision(p=>!p)}>
                ✏️ {lang==='fr'?'Réviser le rapport':'Revise report'}
              </button>
              {showRevision && (
                <div style={{marginTop:10}}>
                  <textarea className="aiq-textarea" placeholder={lang==='fr'?'Demandes de révision…':'Revision requests…'} value={revision} onChange={e=>setRevision(e.target.value)} />
                  <button className="aiq-btn aiq-btn-primary" style={{width:'100%',marginTop:8}} onClick={()=>gen.run()}>
                    {lang==='fr'?'Régénérer':'Re-generate'}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Right */}
        <div className="aiq-card aiq-output-card">
          <div className="aiq-tab-bar" style={{marginBottom:16,flexWrap:'wrap'}}>
            {reportTabs.map(tb=>(
              <button key={tb.id} className="aiq-tab" data-active={tab===tb.id} onClick={()=>setTab(tb.id)} style={{fontSize:11}}>{tb[lang]}</button>
            ))}
          </div>

          {/* S1 — Executive Summary */}
          {tab==='s1' && (
            <div>
              <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20,flexWrap:'wrap'}}>
                <span className="aiq-pill aiq-pill-yellow" style={{fontSize:13,padding:'6px 16px'}}>
                  ⚠ {lang==='fr'?'Améliorations nécessaires':'Needs Improvement'}
                </span>
                <span style={{fontSize:12,color:'var(--aiq-muted)'}}>
                  {lang==='fr'?'Période : Jan–Avr 2026':'Period: Jan–Apr 2026'} · AUD-2026-014
                </span>
              </div>
              <div className="aiq-stat-row" style={{marginBottom:20}}>
                {[
                  {l:lang==='fr'?'Total constats':'Total findings', v:findings.length, cls:''},
                  {l:lang==='fr'?'Critiques':'Critical', v:findings.filter(f=>f.sev==='critical').length, cls:'red'},
                  {l:lang==='fr'?'Élevés':'High', v:findings.filter(f=>f.sev==='high').length, cls:'orange'},
                  {l:lang==='fr'?'Moyens':'Medium', v:findings.filter(f=>f.sev==='medium').length, cls:'yellow'},
                ].map(item=>(
                  <div key={item.l} className="aiq-stat" style={{padding:'14px 16px'}}>
                    <div className="lbl">{item.l}</div>
                    <div className="val" style={{fontSize:28,color:item.cls?`var(--jra-${item.cls})`:'var(--aiq-text)'}}>{item.v}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:16,background:'rgba(255,255,255,.02)',border:'1px solid var(--aiq-border)',borderRadius:10,fontSize:13,color:'var(--aiq-text-2)',lineHeight:1.7}}>
                {lang==='fr'
                  ? `L'audit AML/KYC réalisé sur la période janvier–avril 2026 a permis d'identifier ${findings.length} constats dont ${findings.filter(f=>f.sev==='critical').length} de niveau critique nécessitant une action immédiate. Les principales faiblesses concernent la mise à jour des données KYC pour les clients PEP et la formalisation des procédures d'escalade SAR.`
                  : `The AML/KYC audit conducted for the period January–April 2026 identified ${findings.length} findings including ${findings.filter(f=>f.sev==='critical').length} critical items requiring immediate action. Key weaknesses relate to KYC data updates for PEP clients and formalisation of SAR escalation procedures.`}
              </div>
            </div>
          )}

          {/* S2 — Summary of Findings */}
          {tab==='s2' && (
            <div className="aiq-card" style={{padding:0,overflowX:'auto'}}>
              <table className="aiq-table">
                <thead><tr>
                  <th>ID</th><th>{lang==='fr'?'Constat':'Finding'}</th>
                  <th>{lang==='fr'?'Catégorie':'Category'}</th>
                  <th>{lang==='fr'?'Sévérité':'Severity'}</th>
                  <th>{lang==='fr'?'Statut':'Status'}</th>
                  <th>{lang==='fr'?'Responsable':'Owner'}</th>
                </tr></thead>
                <tbody>
                  {recommendations.map(f=>(
                    <tr key={f.id}>
                      <td><span className="id">{f.id}</span></td>
                      <td style={{color:'var(--aiq-text)',maxWidth:280,fontSize:12.5}}>{f[`title_${lang}`]}</td>
                      <td><span className="aiq-pill aiq-pill-indigo" style={{fontSize:10}}>AML/KYC</span></td>
                      <td><span className={`aiq-pill aiq-pill-${sevCls(f.sev)}`}>{f.sev}</span></td>
                      <td><span className="aiq-pill aiq-pill-orange" style={{fontSize:10}}>{lang==='fr'?'Ouvert':'Open'}</span></td>
                      <td style={{fontSize:12,color:'var(--aiq-muted)'}}>{f.owner}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* S3 — Detailed Recommendations */}
          {tab==='s3' && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {recommendations.map(f=>(
                <div key={f.id} className="aiq-card aiq-card-tight">
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
                    <span className="id">{f.id}</span>
                    <span style={{fontWeight:700,color:'var(--aiq-text)',fontSize:13,flex:1}}>{f[`title_${lang}`]}</span>
                    <span className={`aiq-pill aiq-pill-${sevCls(f.sev)}`}>{f.sev}</span>
                  </div>
                  <p style={{fontSize:12.5,color:'var(--aiq-muted)',margin:'0 0 10px',lineHeight:1.5}}>{f[`desc_${lang}`]}</p>
                  <div style={{padding:'10px 12px',background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.2)',borderRadius:8,fontSize:12.5,color:'var(--aiq-text-2)',lineHeight:1.5,marginBottom:10}}>
                    💡 {f[`rec_${lang}`]}
                  </div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {f.jur.map(jid=>{const jr=window.AIQ.jurisdictions.find(x=>x.id===jid);return <span key={jid} style={{fontSize:15}}>{jr.flag}</span>;})}
                    <span className="aiq-pill aiq-pill-blue" style={{fontSize:10}}>⏱ {f[`timeline_${lang}`]}</span>
                    <span className="aiq-pill aiq-pill-gray" style={{fontSize:10}}>👤 {f.owner}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* S4 — Action Plan */}
          {tab==='s4' && (
            <div className="aiq-card" style={{padding:0,overflowX:'auto'}}>
              <table className="aiq-table">
                <thead><tr>
                  <th>ID</th><th>{lang==='fr'?'Action':'Action'}</th>
                  <th>{lang==='fr'?'Responsable':'Owner'}</th>
                  <th>{lang==='fr'?'Échéance':'Due date'}</th>
                  <th>{lang==='fr'?'Priorité':'Priority'}</th>
                  <th>{lang==='fr'?'Statut':'Status'}</th>
                </tr></thead>
                <tbody>
                  {recommendations.map((f,i)=>(
                    <tr key={f.id}>
                      <td><span className="id">{f.id}</span></td>
                      <td style={{fontSize:12,color:'var(--aiq-text)',maxWidth:260}}>{f[`rec_${lang}`].substring(0,80)}…</td>
                      <td style={{fontSize:12,color:'var(--aiq-muted)'}}>{f.owner}</td>
                      <td style={{fontSize:11,color:'var(--aiq-muted)',whiteSpace:'nowrap'}}>
                        {i===0?'2026-06-30':i===1?'2026-07-31':i===2?'2026-08-31':'2026-09-30'}
                      </td>
                      <td><span className={`aiq-pill aiq-pill-${sevCls(f.sev)}`}>{f.sev}</span></td>
                      <td><span className="aiq-pill aiq-pill-orange" style={{fontSize:10}}>{lang==='fr'?'À lancer':'To start'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* SA — IIA Standards */}
          {tab==='sa' && (
            <div>
              <div style={{marginBottom:12}}>
                <input className="aiq-input" placeholder={lang==='fr'?'Rechercher norme…':'Search standard…'} value={iiaSearch} onChange={e=>setIiaSearch(e.target.value)} />
              </div>
              <div className="aiq-card" style={{padding:0,overflowX:'auto'}}>
                <table className="aiq-table">
                  <thead><tr>
                    <th>ID</th><th>Titre</th>
                    <th>{lang==='fr'?'Périmètre':'Scope'}</th>
                    <th>{lang==='fr'?'Application':'Applicability'}</th>
                  </tr></thead>
                  <tbody>
                    {iiaStds.map(s=>(
                      <tr key={s.id}>
                        <td><span style={{fontFamily:'ui-monospace,Menlo,monospace',fontSize:11,color:'var(--aiq-accent-2)',fontWeight:700}}>{s.id}</span></td>
                        <td style={{color:'var(--aiq-text)',fontWeight:500,fontSize:12.5}}>{s[`title_${lang}`]}</td>
                        <td style={{fontSize:11.5,color:'var(--aiq-muted)',maxWidth:200}}>{s[`scope_${lang}`]}</td>
                        <td style={{fontSize:11,color:'var(--aiq-faint)'}}>{s[`applicability_${lang}`]}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* SB — Regulatory Reference */}
          {tab==='sb' && (
            <div>
              <div style={{marginBottom:12}}>
                <input className="aiq-input" placeholder={lang==='fr'?'Rechercher réglementation…':'Search regulation…'} value={refSearch} onChange={e=>setRefSearch(e.target.value)} />
              </div>
              {window.AIQ.jurisdictions.map(jur=>{
                const jRegs = refRegs.filter(r=>r.jur===jur.id);
                if (!jRegs.length) return null;
                return (
                  <div key={jur.id} style={{marginBottom:16}}>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--aiq-text)',marginBottom:8}}>{jur.flag} {jur[lang]} · <span style={{color:'var(--aiq-faint)',fontWeight:400,fontSize:11}}>{jur.regulator}</span></div>
                    <div className="aiq-card" style={{padding:0}}>
                      <table className="aiq-table">
                        <thead><tr><th>Référence</th><th>Titre</th><th>{lang==='fr'?'Sévérité':'Severity'}</th></tr></thead>
                        <tbody>
                          {jRegs.map((r,i)=>(
                            <tr key={i}>
                              <td><span style={{fontFamily:'ui-monospace,Menlo,monospace',fontSize:11,color:'var(--aiq-accent-2)'}}>{r.code}</span></td>
                              <td style={{fontSize:12.5,color:'var(--aiq-text-2)'}}>{r[lang]}</td>
                              <td><span className={`aiq-pill aiq-pill-${r.severity==='critical'?'red':r.severity==='high'?'orange':'yellow'}`} style={{fontSize:9}}>{r.severity}</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
      <div className="aiq-footer">{t('footer')}</div>
    </div>
  );
};

Object.assign(window, {
  AIQ_IntelligenceSection: IntelligenceSection,
  AIQ_RiskScreen: RiskScreen,
  AIQ_PlanScreen: PlanScreen,
  AIQ_ReportScreen: ReportScreen,
});
</script>
  <script type="text/babel" data-presets="react">// app.jsx — AuditIQ root: sign-in cover → app shell with routing.
const { useState: useStateApp, useEffect: useEffectApp } = React;

function AuditIQApp() {
  const [lang, setLang] = useStateApp(() => localStorage.getItem('aiq-lang') || 'fr');
  const [authed, setAuthed] = useStateApp(false);
  const [route, setRoute] = useStateApp('dashboard');
  const [navOpen, setNavOpen] = useStateApp(false);

  useEffectApp(() => { localStorage.setItem('aiq-lang', lang); }, [lang]);
  // reset scroll on route change
  useEffectApp(() => { const m = document.querySelector('.aiq-main'); if (m) m.scrollTop = 0; window.scrollTo(0, 0); }, [route]);

  const screen = () => {
    switch (route) {
      case 'dashboard': return <window.AIQ_DashboardScreen lang={lang} setRoute={setRoute} />;
      case 'audits':    return <window.AIQ_AuditsScreen lang={lang} setRoute={setRoute} />;
      case 'risk':      return <window.AIQ_RiskScreen lang={lang} />;
      case 'plan':      return <window.AIQ_PlanScreen lang={lang} />;
      case 'report':    return <window.AIQ_ReportScreen lang={lang} />;
      case 'agent1':
      case 'agent2':
      case 'agent3':    return <window.AIQ_AgentScreen lang={lang} agentId={route} setRoute={setRoute} />;
      case 'documents': return <window.AIQ_DocumentsScreen lang={lang} />;
      case 'history':   return <window.AIQ_HistoryScreen lang={lang} />;
      case 'settings':  return <window.AIQ_SettingsScreen lang={lang} setLang={setLang} />;
      default:          return <window.AIQ_DashboardScreen lang={lang} setRoute={setRoute} />;
    }
  };

  if (!authed) {
    return <window.AIQ_SignIn lang={lang} setLang={setLang} onEnter={() => setAuthed(true)} />;
  }

  return (
    <React.Fragment>
      <div className="aiq-blob b1" />
      <div className="aiq-blob b2" />
      <div className="aiq-app">
        <div className={`aiq-scrim ${navOpen ? 'open' : ''}`} onClick={() => setNavOpen(false)} />
        <window.AIQ_Sidebar route={route} setRoute={setRoute} lang={lang}
                            open={navOpen} onClose={() => setNavOpen(false)} />
        <div className="aiq-main">
          <window.AIQ_Topbar route={route} lang={lang} setLang={setLang}
                             onMenu={() => setNavOpen(true)} />
          {screen()}
        </div>
      </div>
    </React.Fragment>
  );
}

const aiqRoot = ReactDOM.createRoot(document.getElementById('root'));
aiqRoot.render(<AuditIQApp />);
</script>
</body>
</html>
