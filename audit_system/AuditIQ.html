<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AuditIQ — Audit bancaire augmenté par l'IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
/* ════════════════════════════════════════════════════════════════
   JRA Studio — Design Tokens
   Colors, type, spacing, radii, shadows for the 5 JRA products:
   AuditIQ · KidQuest Academy · CoachIQ · PhotoPost AI · Audit Report deck
   ════════════════════════════════════════════════════════════════ */

/* ── Webfonts (all four are Google Fonts; loaded via CDN) ──────── */
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap");

:root {
  /* ─── BASE PALETTE ────────────────────────────────────────────
     The whole portfolio is dark-first. There's no "light mode"
     except in KidQuest (which has both). Greys all sit between
     near-black and off-white with a faint cool tint. */
  --jra-black:        #07090f;   /* deepest — AuditIQ report bg */
  --jra-ink:          #080808;   /* CoachIQ bg */
  --jra-ink-2:        #080b12;   /* AuditIQ app bg */
  --jra-ink-3:        #0e0e0e;   /* CoachIQ sidebar */
  --jra-ink-4:        #0f0f13;   /* PhotoPost bg */
  --jra-coal:         #111111;   /* CoachIQ card */
  --jra-coal-2:       #141414;   /* CoachIQ button bg */
  --jra-graphite:     #1a1a24;   /* PhotoPost surface */
  --jra-graphite-2:   #22223a;   /* PhotoPost surface-2 */
  --jra-line:         #1e1e1e;   /* CoachIQ border */
  --jra-line-soft:    rgba(255,255,255,.07);
  --jra-line-softer:  rgba(255,255,255,.05);

  /* Text */
  --jra-text:         #f0f0f0;   /* CoachIQ / PhotoPost primary */
  --jra-text-2:       #e8edf8;   /* AuditIQ primary */
  --jra-text-3:       #eef0f8;   /* presentation primary */
  --jra-muted:        #7b7a8e;   /* PhotoPost muted */
  --jra-muted-2:      #5a6488;   /* AuditIQ muted */
  --jra-muted-3:      #8392bb;   /* AuditIQ label */
  --jra-faint:        #424d72;   /* AuditIQ sub-label */

  /* ─── BRAND ACCENTS (one signature per product) ───────────────
     These are the colors a user immediately recognises as
     "that JRA app". Use them sparingly — one per surface. */
  --auditiq-blue:        #4f7ef8;   /* AuditIQ primary */
  --auditiq-blue-deep:   #2d54d4;   /* AuditIQ gradient end */
  --auditiq-blue-soft:   #7fa8fb;   /* AuditIQ download link */
  --auditiq-indigo:      #6366f1;   /* Presentation accent */
  --auditiq-indigo-soft: #818cf8;   /* Presentation accent-2 */

  --coachiq-lime:        #CAFF33;   /* CoachIQ primary — THE color */
  --coachiq-lime-hot:    #d8ff5a;   /* CoachIQ hover */
  --coachiq-lime-deep:   #90ee2a;   /* CoachIQ gradient end */

  --photopost-violet:    #7c6ef5;   /* PhotoPost primary */
  --photopost-violet-2:  #a78bfa;   /* PhotoPost accent-2 */
  --photopost-violet-dk: #1e1b4b;   /* PhotoPost header start */
  --photopost-violet-dk2:#312e81;   /* PhotoPost header mid */

  --kidquest-orange:     #FF6B35;   /* KidQuest primary */
  --kidquest-orange-2:   #FF8E53;   /* KidQuest gradient end */
  --kidquest-yellow:     #FFD93D;   /* KidQuest highlight */
  --kidquest-teal:       #4ECDC4;   /* KidQuest secondary */
  --kidquest-teal-2:     #44A9C6;
  --kidquest-mint:       #A8E6CF;   /* KidQuest tertiary */
  --kidquest-mint-2:     #56C596;
  --kidquest-purple:     #667eea;   /* KidQuest "I don't know" */
  --kidquest-purple-2:   #764ba2;
  --kidquest-pink:       #f093fb;
  --kidquest-pink-2:     #f5576c;

  /* ─── SEMANTIC STATUS ─────────────────────────────────────────
     Used across audit reports, math feedback, sports score deltas.
     The same hue lives in multiple shades depending on context. */
  --jra-red:        #ef4444;   /* critique / wrong */
  --jra-red-soft:   #f87171;
  --jra-red-page:   #fca5a5;   /* readable on dark */
  --jra-orange:     #f97316;   /* élevé */
  --jra-orange-soft:#fdba74;
  --jra-yellow:     #eab308;   /* moyen */
  --jra-yellow-soft:#fde047;
  --jra-green:      #22c55e;   /* faible / ok */
  --jra-green-soft: #86efac;
  --jra-green-2:    #22d3a5;   /* AuditIQ status */
  --jra-green-3:    #34d399;   /* PhotoPost ok */
  --jra-blue:       #60a5fa;   /* info */
  --jra-blue-soft:  #93c5fd;

  /* ─── TYPOGRAPHY ──────────────────────────────────────────────
     Four families, one per product personality.
     - Inter: default body & UI. AuditIQ + CoachIQ body.
     - Bebas Neue: CoachIQ display only — scoreboards, section titles.
     - Fredoka: KidQuest display & body (was "Fredoka One" originally,
       now using the variable Fredoka family which covers the same weight).
     - Nunito: KidQuest fallback / secondary body.
     - Segoe UI / system stack: fallback used by the older Streamlit
       apps before custom fonts landed. */
  --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-display: 'Bebas Neue', 'Inter', sans-serif;
  --font-fun:     'Fredoka', 'Nunito', 'Comic Sans MS', cursive;
  --font-system:  'Segoe UI', system-ui, -apple-system, sans-serif;

  /* Type scale — semantic */
  --t-display:   clamp(2rem, 5vw, 3.4rem);   /* hero / cover */
  --t-h1:        clamp(1.5rem, 3vw, 2rem);   /* page title */
  --t-h2:        clamp(1.3rem, 3vw, 1.9rem); /* section title */
  --t-h3:        1.2rem;                     /* sub-section */
  --t-body:      0.95rem;                    /* prose */
  --t-ui:        0.85rem;                    /* buttons, controls */
  --t-small:     0.75rem;                    /* meta, hints */
  --t-tiny:      0.7rem;                     /* labels / badges */

  --lh-tight:    1.15;
  --lh-snug:     1.4;
  --lh-normal:   1.6;
  --lh-loose:    1.75;

  /* ─── SPACING ─────────────────────────────────────────────────
     Loose 4-px grid. Most components use s-3 / s-4 padding. */
  --s-1: 0.25rem; --s-2: 0.5rem;  --s-3: 0.75rem; --s-4: 1rem;
  --s-5: 1.25rem; --s-6: 1.5rem;  --s-7: 1.75rem; --s-8: 2rem;
  --s-10: 2.5rem; --s-12: 3rem;

  /* ─── RADII ───────────────────────────────────────────────────
     A consistent step ladder. KidQuest cards lean to 22px.
     Audit / Coach cards are 10–14px. Pills are 20px+. */
  --r-xs:  6px;
  --r-sm:  8px;
  --r-md:  10px;   /* CoachIQ tabs, AuditIQ buttons */
  --r-lg:  14px;   /* Audit presentation cards */
  --r-xl:  16px;   /* PhotoPost cards */
  --r-2xl: 22px;   /* KidQuest q-cards */
  --r-pill: 9999px;

  /* ─── SHADOWS / GLOWS ─────────────────────────────────────────
     Dark UIs use accent-colored glows more than soft drop shadows.
     The grey-on-grey shadow exists but is rarely visible. */
  --shadow-card:   0 8px 32px rgba(0,0,0,.45);   /* PhotoPost card */
  --shadow-soft:   0 6px 18px rgba(0,0,0,.09);   /* KidQuest light */
  --shadow-lift:   0 4px 20px rgba(124,110,245,.35);  /* PhotoPost btn */
  --shadow-lift-2: 0 8px 28px rgba(124,110,245,.5);
  --glow-lime:     0 0 12px rgba(202,255,51,.15);     /* CoachIQ hover */
  --glow-lime-2:   0 0 18px rgba(202,255,51,.4);      /* CoachIQ active */
  --glow-lime-3:   0 0 24px rgba(202,255,51,.15);     /* CoachIQ selected */
  --glow-blue:     0 0 0 3px rgba(79,126,248,.08);    /* AuditIQ focus */
  --glow-card:     0 8px 22px rgba(0,0,0,.18);

  /* ─── GRADIENTS ───────────────────────────────────────────────
     Three signature patterns used throughout: */
  --grad-auditiq:    linear-gradient(135deg, #2d54d4 0%, #4f7ef8 100%);
  --grad-coachiq:    linear-gradient(135deg, #CAFF33, #90ee2a);
  --grad-photopost:  linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  --grad-photopost-btn: linear-gradient(135deg, #7c6ef5, #60a5fa);
  --grad-kidquest-title: linear-gradient(135deg, #FF6B35, #FFD93D, #4ECDC4);
  --grad-kidquest-orange: linear-gradient(135deg, #FF6B35, #FF8E53);
  --grad-kidquest-teal:   linear-gradient(135deg, #4ECDC4, #44A9C6);
  --grad-kidquest-mint:   linear-gradient(135deg, #A8E6CF, #56C596);
  --grad-kidquest-purple: linear-gradient(135deg, #667eea, #764ba2);
  --grad-kidquest-pink:   linear-gradient(135deg, #f093fb, #f5576c);
  --grad-text-cool:  linear-gradient(130deg, #fff 30%, #818cf8 100%);
  --grad-text-warm:  linear-gradient(135deg, #FF6B35, #FFD93D, #4ECDC4);

  /* ─── MOTION ─────────────────────────────────────────────── */
  --ease:           cubic-bezier(.4, 0, .2, 1);
  --dur-fast:       150ms;
  --dur:            250ms;
  --dur-slow:       550ms;
  --dur-glacial:    1200ms;   /* gauge / counter sweeps */
}


/* ════════════════════════════════════════════════════════════════
   SEMANTIC ELEMENT STYLES
   Importing colors_and_type.css gives you the variables AND these
   default-styled elements so prose / forms look consistent.
   ════════════════════════════════════════════════════════════════ */

body {
  background: var(--jra-ink-2);
  color: var(--jra-text);
  font-family: var(--font-sans);
  line-height: var(--lh-normal);
  font-size: var(--t-body);
}

h1, .h1 {
  font-family: var(--font-sans);
  font-size: var(--t-h1);
  font-weight: 700;
  letter-spacing: -0.4px;
  line-height: var(--lh-tight);
  color: var(--jra-text-2);
}
h2, .h2 {
  font-family: var(--font-sans);
  font-size: var(--t-h2);
  font-weight: 800;
  line-height: var(--lh-tight);
  color: var(--jra-text-2);
}
h3, .h3 {
  font-size: var(--t-h3);
  font-weight: 700;
  color: var(--jra-text-2);
}

p, .body {
  font-size: var(--t-body);
  color: var(--jra-text);
  line-height: var(--lh-normal);
}

small, .small  { font-size: var(--t-small); color: var(--jra-muted); }
.label         { font-size: var(--t-tiny); letter-spacing: 0.1em;
                 text-transform: uppercase; color: var(--jra-muted);
                 font-weight: 700; }

code, pre, .mono {
  font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 0.85em;
}

/* Hero / display — used by KidQuest title & AuditIQ presentation cover */
.display-warm {
  font-family: var(--font-fun);
  font-size: var(--t-display);
  background: var(--grad-text-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: var(--lh-tight);
}
.display-cool {
  font-family: var(--font-sans);
  font-size: var(--t-display);
  font-weight: 900;
  background: var(--grad-text-cool);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: var(--lh-tight);
}
.display-stadium {
  font-family: var(--font-display);
  letter-spacing: 0.04em;
  font-size: clamp(2.5rem, 6vw, 4rem);
  color: var(--jra-text);
}

/* Standard form field — Audit pattern */
.field {
  background: #10141f;
  border: 1px solid var(--jra-line-soft);
  border-radius: var(--r-sm);
  color: var(--jra-text-2);
  font-size: var(--t-ui);
  padding: 0.6rem 0.85rem;
  font-family: var(--font-sans);
  width: 100%;
}
.field:focus {
  outline: none;
  border-color: rgba(79,126,248,.5);
  box-shadow: var(--glow-blue);
}

</style>
<style>
/* AuditIQ — modern indigo-on-navy professional UI */



* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img, svg { display: block; }

:root {
  --aiq-bg: #07090f;
  --aiq-bg-2: #0b0f1a;
  --aiq-surface: #10141f;
  --aiq-surface-2: #161b2a;
  --aiq-border: rgba(255,255,255,.08);
  --aiq-border-2: rgba(255,255,255,.14);
  --aiq-text: #eef0f8;
  --aiq-text-2: #c9cde0;
  --aiq-muted: #8392bb;
  --aiq-faint: #5a6488;
  --aiq-accent: #6366f1;       /* primary indigo */
  --aiq-accent-2: #818cf8;     /* lighter */
  --aiq-accent-3: #4f7ef8;     /* blue alt */
  --aiq-accent-soft: rgba(99,102,241,.14);
  --aiq-glow: 0 0 0 3px rgba(99,102,241,.18);
}

body {
  background: var(--aiq-bg);
  color: var(--aiq-text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ──────────────────────────────────────────────────────────────
   COVER / SIGN-IN — rotating earth + auth panel
   ────────────────────────────────────────────────────────────── */
.aiq-cover {
  position: fixed; inset: 0; z-index: 100;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  background: radial-gradient(ellipse at 30% 20%, #11173a 0%, #07090f 70%);
  overflow: hidden;
  opacity: 1;
  transition: opacity .75s cubic-bezier(.4,0,.2,1);
}
.aiq-cover.fading { opacity: 0; pointer-events: none; }
.aiq-cover::before {
  /* faint star field */
  content: "";
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 13% 22%, rgba(255,255,255,.5) 0, transparent 50%),
    radial-gradient(1px 1px at 28% 78%, rgba(255,255,255,.32) 0, transparent 50%),
    radial-gradient(1px 1px at 41% 14%, rgba(255,255,255,.4) 0, transparent 50%),
    radial-gradient(1px 1px at 9% 54%, rgba(255,255,255,.3) 0, transparent 50%),
    radial-gradient(1px 1px at 47% 52%, rgba(255,255,255,.3) 0, transparent 50%),
    radial-gradient(1px 1px at 36% 90%, rgba(255,255,255,.35) 0, transparent 50%),
    radial-gradient(1px 1px at 21% 38%, rgba(255,255,255,.28) 0, transparent 50%);
  opacity: .7;
}

/* — left hero — */
.aiq-cover-hero {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  padding: 56px clamp(40px, 6vw, 96px);
  gap: 8px;
}
.aiq-cover-brand {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.aiq-cover-brand .mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  display: grid; place-items: center; color: #fff;
  font-weight: 800; font-size: 16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset, 0 8px 24px rgba(99,102,241,.45);
}
.aiq-cover-brand .nm { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--aiq-text); }
.aiq-cover-brand .nm b { color: var(--aiq-accent-2); }

.aiq-cover-globe {
  align-self: center;
  margin: 6px 0 22px;
  filter: drop-shadow(0 0 64px rgba(99,102,241,.4));
  animation: coverGlobeIn 1.1s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes coverGlobeIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }

.aiq-cover-title {
  font-size: clamp(30px, 4vw, 50px);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1.06;
  margin: 0; color: var(--aiq-text);
  animation: coverUp .7s var(--ease) .2s both;
}
.aiq-cover-title .grad {
  background: linear-gradient(120deg, #aab6ff 0%, #6366f1 70%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.aiq-cover-tag {
  margin: 16px 0 0; font-size: 13px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--aiq-muted);
  animation: coverUp .7s var(--ease) .32s both;
}
.aiq-cover-flags {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 26px;
  animation: coverUp .7s var(--ease) .44s both;
}
.aiq-cover-flags .fl {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 12px; border-radius: 999px;
  background: rgba(255,255,255,.04); border: 1px solid var(--aiq-border);
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  color: var(--aiq-text-2);
}
.aiq-cover-flags .fl .em { font-size: 15px; }
@keyframes coverUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* — right auth panel — */
.aiq-cover-auth {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
  background: linear-gradient(180deg, rgba(11,15,26,.72), rgba(7,9,15,.86));
  border-left: 1px solid var(--aiq-border);
  backdrop-filter: blur(8px);
}
.aiq-cover-lang { position: absolute; top: 26px; right: 26px; }

.aiq-signin {
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 14px;
  animation: coverUp .7s var(--ease) .15s both;
}
.aiq-signin-head h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; color: var(--aiq-text); }
.aiq-signin-head p { margin: 0 0 6px; font-size: 13.5px; color: var(--aiq-muted); line-height: 1.5; }

.aiq-signin-field { display: flex; flex-direction: column; gap: 7px; }
.aiq-signin-field > span { font-size: 12px; font-weight: 600; color: var(--aiq-text-2); letter-spacing: 0.02em; }
.aiq-signin-field .ip { position: relative; }
.aiq-signin-field .ic {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  font-size: 14px; opacity: .65; pointer-events: none;
}
.aiq-signin-field input {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  border-radius: 10px;
  padding: 12px 14px 12px 40px;
  color: var(--aiq-text); font-family: inherit; font-size: 14px;
  outline: none; transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
}
.aiq-signin-field input:focus { border-color: rgba(99,102,241,.5); box-shadow: var(--aiq-glow); background: rgba(255,255,255,.06); }

.aiq-signin-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12.5px; margin-top: 2px;
}
.aiq-signin-row a { color: var(--aiq-accent-2); font-weight: 600; }
.aiq-signin-row a:hover { text-decoration: underline; }
.aiq-check { display: inline-flex; align-items: center; gap: 8px; color: var(--aiq-text-2); cursor: pointer; user-select: none; }
.aiq-check .box {
  width: 17px; height: 17px; border-radius: 5px;
  border: 1.5px solid var(--aiq-border-2); background: rgba(255,255,255,.03);
  display: grid; place-items: center; font-size: 11px; color: #fff;
  transition: all .15s var(--ease);
}
.aiq-check .box[data-on="true"] { background: var(--aiq-accent); border-color: var(--aiq-accent); }

.aiq-signin-btn {
  margin-top: 6px;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: #fff; border: 0; border-radius: 10px;
  padding: 14px 18px; font-family: inherit; font-size: 14.5px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 8px 24px rgba(99,102,241,.4);
  transition: transform .15s var(--ease), box-shadow .15s var(--ease), opacity .15s var(--ease);
}
.aiq-signin-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(99,102,241,.55); }
.aiq-signin-btn:disabled { cursor: default; opacity: .85; }
.aiq-signin-btn .arr { transition: transform .15s var(--ease); }
.aiq-signin-btn:hover:not(:disabled) .arr { transform: translateX(4px); }

.aiq-signin-or {
  display: flex; align-items: center; gap: 12px;
  color: var(--aiq-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  margin: 2px 0;
}
.aiq-signin-or::before, .aiq-signin-or::after { content: ""; flex: 1; height: 1px; background: var(--aiq-border); }

.aiq-signin-sso { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.aiq-signin-sso button {
  background: rgba(255,255,255,.03); border: 1px solid var(--aiq-border);
  border-radius: 10px; padding: 11px; color: var(--aiq-text-2);
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s var(--ease);
}
.aiq-signin-sso button:hover { background: rgba(255,255,255,.07); color: var(--aiq-text); border-color: var(--aiq-border-2); }
.aiq-signin-sso .g { font-size: 14px; }

.aiq-signin-foot {
  margin: 8px 0 0; display: flex; flex-direction: column; gap: 8px; align-items: center;
  font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--aiq-faint);
  text-align: center;
}

@media (max-width: 880px) {
  .aiq-cover { grid-template-columns: 1fr; overflow-y: auto; }
  .aiq-cover-hero { padding: 40px 28px 8px; align-items: center; text-align: center; }
  .aiq-cover-title, .aiq-cover-tag { text-align: center; }
  .aiq-cover-flags { justify-content: center; }
  .aiq-cover-globe { transform: scale(.82); margin: 0; }
  .aiq-cover-auth { border-left: 0; border-top: 1px solid var(--aiq-border); padding: 32px 24px 48px; }
  .aiq-cover-lang { top: 18px; right: 18px; }
}

/* — rotating earth globe — */
.aiq-globe { position: relative; }
.aiq-globe svg { width: 100%; height: 100%; overflow: visible; }
.aiq-globe .aiq-earth-spin {
  animation: earthSpin 26s linear infinite;
}
@keyframes earthSpin {
  from { transform: translateX(0); }
  to   { transform: translateX(-380px); }
}
.aiq-globe .aiq-orbit {
  animation: orbitSpin 16s linear infinite;
}
@keyframes orbitSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@media (prefers-reduced-motion: reduce) {
  .aiq-globe .aiq-earth-spin, .aiq-globe .aiq-orbit { animation: none; }
}

/* Ambient blobs (subtle background) */
.aiq-blob {
  position: fixed; border-radius: 50%;
  filter: blur(120px); opacity: .14;
  pointer-events: none; z-index: 0;
}
.aiq-blob.b1 { width: 600px; height: 600px; background: #4f46e5; top: -180px; left: -180px;
               animation: blobMove1 22s ease-in-out infinite; }
.aiq-blob.b2 { width: 480px; height: 480px; background: #0ea5e9; bottom: -120px; right: -100px;
               animation: blobMove2 26s ease-in-out infinite; }
@keyframes blobMove1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(90px,60px)} }
@keyframes blobMove2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-70px,-90px)} }

/* ──────────────────────────────────────────────────────────────
   APP SHELL
   ────────────────────────────────────────────────────────────── */
.aiq-app {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 268px 1fr;
  min-height: 100vh;
  opacity: 0;
  animation: appIn .6s var(--ease) .5s forwards;
}
@keyframes appIn { to { opacity: 1; } }

.aiq-sidebar {
  position: sticky; top: 0; height: 100vh;
  background: linear-gradient(180deg, var(--aiq-bg-2) 0%, var(--aiq-bg) 100%);
  border-right: 1px solid var(--aiq-border);
  display: flex; flex-direction: column;
  padding: 22px 14px 18px;
  overflow-y: auto;
}
.aiq-brand {
  display: flex; align-items: center; gap: 12px;
  padding: 4px 10px 18px;
}
.aiq-brand .mark {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  display: grid; place-items: center;
  color: #fff;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0;
  box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 6px 20px rgba(99,102,241,.4);
}
.aiq-brand .name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--aiq-text);
}
.aiq-brand .name b { color: var(--aiq-accent-2); }
.aiq-brand .badge {
  margin-left: auto;
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  background: rgba(99,102,241,.14);
  border: 1px solid rgba(99,102,241,.3);
  color: var(--aiq-accent-2);
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: 700;
}

.aiq-nav-title {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--aiq-faint);
  font-weight: 700;
  padding: 14px 12px 6px;
}
.aiq-nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px;
  border-radius: 8px;
  color: var(--aiq-text-2);
  font-size: 13.5px;
  font-weight: 500;
  border: 1px solid transparent;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: all .15s var(--ease);
}
.aiq-nav-item:hover { background: rgba(255,255,255,.04); color: var(--aiq-text); }
.aiq-nav-item[data-active="true"] {
  background: var(--aiq-accent-soft);
  color: #fff;
  border-color: rgba(99,102,241,.3);
}
.aiq-nav-item .ic {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  font-size: 15px;
  background: rgba(255,255,255,.03);
  border-radius: 7px;
  border: 1px solid var(--aiq-border);
  flex-shrink: 0;
}
.aiq-nav-item[data-active="true"] .ic {
  background: rgba(99,102,241,.2);
  border-color: rgba(99,102,241,.4);
}
.aiq-nav-item .ic.agent {
  color: var(--agent-color, var(--aiq-accent-2));
}
.aiq-nav-item .lbl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.aiq-nav-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--aiq-accent-2);
}

.aiq-sidebar-foot {
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--aiq-border);
}

.aiq-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 8px;
  border-radius: 10px;
  border: 1px solid var(--aiq-border);
  background: rgba(255,255,255,.02);
}
.aiq-user .av {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  display: grid; place-items: center;
  color: #fff;
  font-weight: 700;
  font-size: 12px;
}
.aiq-user .meta { flex: 1; min-width: 0; }
.aiq-user .meta .nm { font-size: 13px; font-weight: 600; color: var(--aiq-text); line-height: 1.2; }
.aiq-user .meta .ro { font-size: 11px; color: var(--aiq-muted); line-height: 1.2; }

/* ──────────────────────────────────────────────────────────────
   MAIN COLUMN
   ────────────────────────────────────────────────────────────── */
.aiq-main { min-width: 0; padding-bottom: 60px; }

.aiq-topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 32px;
  background: rgba(7,9,15,.78);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--aiq-border);
}
.aiq-topbar .crumbs {
  font-size: 13px;
  color: var(--aiq-muted);
  display: flex; align-items: center; gap: 8px;
  flex: 0 0 auto;
}
.aiq-topbar .crumbs .here {
  color: var(--aiq-text);
  font-weight: 600;
  font-size: 14px;
}
.aiq-topbar .crumbs .sep { color: var(--aiq-faint); }
.aiq-topbar .spacer { flex: 1; }

.aiq-search {
  flex: 1 1 320px;
  max-width: 420px;
  position: relative;
  min-width: 0;
}
.aiq-search input {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  border-radius: 10px;
  padding: 9px 14px 9px 38px;
  color: var(--aiq-text);
  font-size: 13px;
  outline: none;
  transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
}
.aiq-search input:focus {
  border-color: rgba(99,102,241,.45);
  box-shadow: var(--aiq-glow);
}
.aiq-search input::placeholder { color: var(--aiq-faint); }
.aiq-search .ic {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--aiq-muted);
  pointer-events: none;
}

.aiq-lang {
  display: inline-flex;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  border-radius: 8px;
  padding: 3px;
}
.aiq-lang button {
  background: transparent; border: 0;
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 5px 10px;
  border-radius: 6px;
  color: var(--aiq-muted);
}
.aiq-lang button[data-active="true"] {
  background: var(--aiq-surface);
  color: var(--aiq-accent-2);
}

.aiq-icon-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  border-radius: 9px;
  color: var(--aiq-text-2);
  display: grid; place-items: center;
  transition: all .15s var(--ease);
}
.aiq-icon-btn:hover { background: rgba(255,255,255,.08); color: var(--aiq-text); }
.aiq-icon-btn .badge-dot {
  position: absolute;
  width: 8px; height: 8px;
  background: #ef4444;
  border-radius: 50%;
  top: 6px; right: 6px;
  border: 2px solid var(--aiq-bg);
}

/* ──────────────────────────────────────────────────────────────
   BUTTONS
   ────────────────────────────────────────────────────────────── */
.aiq-btn {
  appearance: none; border: 1px solid transparent;
  font-family: inherit;
  font-weight: 600;
  font-size: 13.5px;
  padding: 10px 18px;
  border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s var(--ease);
  white-space: nowrap;
}
.aiq-btn-primary {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: #fff;
  box-shadow: 0 6px 20px rgba(99,102,241,.35);
}
.aiq-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(99,102,241,.5); }
.aiq-btn-primary:disabled {
  background: rgba(255,255,255,.05); color: var(--aiq-faint);
  box-shadow: none; transform: none; cursor: not-allowed;
}
.aiq-btn-ghost {
  background: rgba(255,255,255,.03);
  color: var(--aiq-text-2);
  border-color: var(--aiq-border);
}
.aiq-btn-ghost:hover { background: rgba(255,255,255,.08); color: var(--aiq-text); border-color: var(--aiq-border-2); }
.aiq-btn-sm { padding: 7px 12px; font-size: 12px; }
.aiq-btn-lg { padding: 13px 24px; font-size: 14px; }

/* ──────────────────────────────────────────────────────────────
   CONTENT / PAGE
   ────────────────────────────────────────────────────────────── */
.aiq-page {
  padding: 28px 32px 50px;
  max-width: 1440px;
}
.aiq-page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; margin-bottom: 28px; flex-wrap: wrap;
}
.aiq-h1 {
  font-size: clamp(26px, 3vw, 32px);
  font-weight: 800;
  letter-spacing: -0.025em;
  margin: 0 0 6px;
  color: var(--aiq-text);
  line-height: 1.15;
}
.aiq-h2 {
  font-size: 16px;
  font-weight: 700;
  margin: 0;
  color: var(--aiq-text);
  letter-spacing: -0.01em;
}
.aiq-sub {
  color: var(--aiq-muted);
  font-size: 14px;
  margin: 0;
}

.aiq-grid { display: grid; gap: 16px; }
.aiq-row { display: flex; gap: 12px; }
.aiq-col { display: flex; flex-direction: column; gap: 16px; }

/* ──────────────────────────────────────────────────────────────
   CARDS
   ────────────────────────────────────────────────────────────── */
.aiq-card {
  background: var(--aiq-surface);
  border: 1px solid var(--aiq-border);
  border-radius: 14px;
  padding: 22px;
  position: relative;
}
.aiq-card-tight { padding: 16px; border-radius: 12px; }
.aiq-card-glass {
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  backdrop-filter: blur(16px);
}

.aiq-card-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

/* ──────────────────────────────────────────────────────────────
   STAT TILES
   ────────────────────────────────────────────────────────────── */
.aiq-stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.aiq-stat {
  background: linear-gradient(180deg, var(--aiq-surface), var(--aiq-surface-2));
  border: 1px solid var(--aiq-border);
  border-radius: 14px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.aiq-stat::after {
  content: ""; position: absolute;
  inset: 0 0 auto 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--aiq-accent-2), transparent);
  opacity: 0.4;
}
.aiq-stat .lbl {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--aiq-muted);
  font-weight: 700;
  min-height: 2.4em;
  display: flex; align-items: flex-start;
}
.aiq-stat .val {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--aiq-text);
  line-height: 1.1;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.aiq-stat .delta {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
}
.aiq-stat .delta.up { color: #22c55e; }
.aiq-stat .delta.down { color: #ef4444; }
.aiq-stat .delta.flat { color: var(--aiq-muted); }
.aiq-stat .meta {
  margin-top: 12px;
  font-size: 11px;
  color: var(--aiq-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ──────────────────────────────────────────────────────────────
   PILLS / BADGES
   ────────────────────────────────────────────────────────────── */
.aiq-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid var(--aiq-border);
  background: rgba(255,255,255,.04);
  color: var(--aiq-text-2);
  font-family: var(--font-sans);
  white-space: nowrap;
}
.aiq-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.aiq-pill-indigo { background: rgba(99,102,241,.14); border-color: rgba(99,102,241,.3); color: var(--aiq-accent-2); }
.aiq-pill-green  { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.3); color: #86efac; }
.aiq-pill-orange { background: rgba(249,115,22,.12); border-color: rgba(249,115,22,.3); color: #fdba74; }
.aiq-pill-red    { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.3); color: #fca5a5; }
.aiq-pill-yellow { background: rgba(234,179,8,.12); border-color: rgba(234,179,8,.3); color: #fde047; }
.aiq-pill-blue   { background: rgba(96,165,250,.12); border-color: rgba(96,165,250,.3); color: #93c5fd; }

/* ──────────────────────────────────────────────────────────────
   PROGRESS BAR
   ────────────────────────────────────────────────────────────── */
.aiq-progress {
  height: 6px; background: rgba(255,255,255,.06);
  border-radius: 3px; overflow: hidden;
}
.aiq-progress > span {
  display: block; height: 100%;
  background: linear-gradient(90deg, #6366f1, #818cf8);
  border-radius: 3px;
  transition: width .9s cubic-bezier(.4,0,.2,1);
}

/* ──────────────────────────────────────────────────────────────
   TABLE
   ────────────────────────────────────────────────────────────── */
.aiq-table {
  width: 100%;
  border-collapse: collapse;
}
.aiq-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--aiq-muted);
  border-bottom: 1px solid var(--aiq-border);
}
.aiq-table td {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--aiq-text-2);
  border-bottom: 1px solid var(--aiq-border);
}
.aiq-table tbody tr {
  transition: background .15s var(--ease);
  cursor: pointer;
}
.aiq-table tbody tr:hover { background: rgba(255,255,255,.02); }
.aiq-table tbody tr:last-child td { border-bottom: 0; }
.aiq-table .id {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  color: var(--aiq-accent-2);
  font-weight: 600;
  font-size: 12px;
}

/* ──────────────────────────────────────────────────────────────
   ACTIVITY FEED
   ────────────────────────────────────────────────────────────── */
.aiq-activity-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--aiq-border);
}
.aiq-activity-row:last-child { border-bottom: 0; }
.aiq-activity-row .ic {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  display: grid; place-items: center;
  font-size: 16px;
}
.aiq-activity-row .who { font-weight: 600; color: var(--aiq-text); font-size: 13px; }
.aiq-activity-row .what { font-size: 12.5px; color: var(--aiq-muted); }
.aiq-activity-row .when {
  font-size: 11px;
  color: var(--aiq-faint);
  font-family: ui-monospace, Menlo, monospace;
}

/* ──────────────────────────────────────────────────────────────
   AGENT TILE
   ────────────────────────────────────────────────────────────── */
.aiq-agent-tile {
  background: var(--aiq-surface);
  border: 1px solid var(--aiq-border);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all .2s var(--ease);
  position: relative;
  overflow: hidden;
  text-align: left;
  width: 100%;
}
.aiq-agent-tile:hover {
  border-color: rgba(99,102,241,.4);
  transform: translateY(-2px);
}
.aiq-agent-tile::before {
  content: ""; position: absolute; inset: 0 0 auto 0;
  height: 2px;
  background: var(--agent-color, var(--aiq-accent-2));
  opacity: 0; transition: opacity .25s var(--ease);
}
.aiq-agent-tile:hover::before { opacity: 1; }
.aiq-agent-tile .head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.aiq-agent-tile .ic {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: grid; place-items: center;
  font-size: 22px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  color: var(--agent-color, var(--aiq-accent-2));
}
.aiq-agent-tile h3 { font-size: 15px; font-weight: 700; margin: 0; color: var(--aiq-text); }
.aiq-agent-tile .num { font-size: 10px; letter-spacing: 0.14em; color: var(--aiq-muted); text-transform: uppercase; font-weight: 700; }
.aiq-agent-tile p { font-size: 13px; color: var(--aiq-muted); margin: 0 0 14px; line-height: 1.5; }

/* ──────────────────────────────────────────────────────────────
   FORM
   ────────────────────────────────────────────────────────────── */
.aiq-field {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 16px;
}
.aiq-field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--aiq-text-2);
  letter-spacing: 0.02em;
}
.aiq-field .hint {
  font-size: 11px;
  color: var(--aiq-faint);
  font-style: italic;
}
.aiq-input, .aiq-select, .aiq-textarea {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--aiq-border);
  border-radius: 9px;
  color: var(--aiq-text);
  font-family: inherit;
  font-size: 13.5px;
  padding: 10px 14px;
  outline: none;
  transition: all .15s var(--ease);
  width: 100%;
}
.aiq-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
.aiq-input::placeholder, .aiq-textarea::placeholder { color: var(--aiq-faint); }
.aiq-input:focus, .aiq-select:focus, .aiq-textarea:focus {
  border-color: rgba(99,102,241,.45);
  box-shadow: var(--aiq-glow);
  background: rgba(255,255,255,.05);
}

.aiq-chip-grid {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.aiq-chip-check {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--aiq-border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--aiq-text-2);
  cursor: pointer;
  transition: all .15s var(--ease);
  user-select: none;
}
.aiq-chip-check:hover { border-color: var(--aiq-border-2); color: var(--aiq-text); }
.aiq-chip-check[data-checked="true"] {
  background: rgba(99,102,241,.18);
  border-color: rgba(99,102,241,.45);
  color: #fff;
}
.aiq-chip-check .check {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  display: grid; place-items: center;
  font-size: 9px;
  opacity: 0.5;
}
.aiq-chip-check[data-checked="true"] .check {
  background: var(--aiq-accent);
  border-color: var(--aiq-accent);
  color: #fff;
  opacity: 1;
}

/* ──────────────────────────────────────────────────────────────
   STATUS PILLS (capability / agent status)
   ────────────────────────────────────────────────────────────── */
.aiq-status-tile {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--aiq-border);
  background: rgba(255,255,255,.02);
}
.aiq-status-tile .icb {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(99,102,241,.14);
  display: grid; place-items: center;
  font-size: 16px;
}
.aiq-status-tile .nm { font-size: 13px; font-weight: 600; color: var(--aiq-text); line-height: 1.2; }
.aiq-status-tile .st { font-size: 11px; color: var(--aiq-muted); display: flex; align-items: center; gap: 4px; }
.aiq-status-tile .st .live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 0 0 rgba(34,197,94,.5);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
  70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}

/* ──────────────────────────────────────────────────────────────
   AUDIT CARD
   ────────────────────────────────────────────────────────────── */
.aiq-audit-card {
  background: var(--aiq-surface);
  border: 1px solid var(--aiq-border);
  border-radius: 14px;
  padding: 18px;
  cursor: pointer;
  transition: all .15s var(--ease);
}
.aiq-audit-card:hover { border-color: var(--aiq-border-2); background: var(--aiq-surface-2); }
.aiq-audit-card .id { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--aiq-faint); letter-spacing: 0.04em; }
.aiq-audit-card .subj { font-size: 14px; font-weight: 600; color: var(--aiq-text); margin: 4px 0 12px; line-height: 1.35; }
.aiq-audit-card .jur-row { display: flex; gap: 4px; margin-bottom: 12px; font-size: 16px; }
.aiq-audit-card .meta-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap;
  font-size: 11px; color: var(--aiq-muted);
}
.aiq-audit-card .prog-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px;
  font-size: 11px; color: var(--aiq-muted);
  font-variant-numeric: tabular-nums;
}
.aiq-audit-card .prog-row .aiq-progress { flex: 1; }

/* ──────────────────────────────────────────────────────────────
   SEVERITY VISUAL
   ────────────────────────────────────────────────────────────── */
.aiq-sev-bar {
  display: inline-block;
  width: 4px; height: 18px;
  border-radius: 2px;
  margin-right: 8px;
  vertical-align: middle;
}
.aiq-sev-bar.critical { background: #ef4444; }
.aiq-sev-bar.high     { background: #f97316; }
.aiq-sev-bar.medium   { background: #eab308; }
.aiq-sev-bar.low      { background: #22c55e; }
.aiq-sev-bar.info     { background: #60a5fa; }

/* ──────────────────────────────────────────────────────────────
   GENERATION PANE (3 agents)
   ────────────────────────────────────────────────────────────── */
.aiq-gen-split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
  gap: 18px;
}
@media (max-width: 980px) {
  .aiq-gen-split { grid-template-columns: 1fr; }
}

.aiq-output-card {
  min-height: 460px;
  display: flex; flex-direction: column;
}
.aiq-output-empty {
  flex: 1;
  display: grid; place-items: center;
  text-align: center;
  color: var(--aiq-muted);
  padding: 40px 20px;
  border: 1px dashed var(--aiq-border-2);
  border-radius: 12px;
  background: rgba(255,255,255,.01);
}
.aiq-output-empty .ic { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

/* Bouncing dots while "generating" */
.aiq-typing {
  display: inline-flex; gap: 4px; margin-left: 6px;
}
.aiq-typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--aiq-accent-2);
  animation: typingBounce 1.2s ease-in-out infinite;
}
.aiq-typing span:nth-child(2) { animation-delay: .15s; }
.aiq-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes typingBounce {
  0%,100% { transform: translateY(0); opacity: 0.4; }
  50% { transform: translateY(-4px); opacity: 1; }
}

/* Inline preview content (regulation list, plan steps, findings) */
.aiq-prev-list {
  display: flex; flex-direction: column; gap: 10px;
  flex: 1;
}
.aiq-prev-item {
  background: rgba(255,255,255,.02);
  border: 1px solid var(--aiq-border);
  border-radius: 10px;
  padding: 14px 16px;
  animation: fadeUp .5s var(--ease) backwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.aiq-prev-item .jur-tag {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 10px;
  background: rgba(99,102,241,.14);
  color: var(--aiq-accent-2);
  border-radius: 4px;
  padding: 2px 7px;
  letter-spacing: 0.04em;
  display: inline-block;
  margin-right: 8px;
}
.aiq-prev-item .code { font-weight: 700; color: var(--aiq-text); font-size: 13px; }
.aiq-prev-item .ttl { font-size: 13px; color: var(--aiq-text-2); margin-top: 4px; line-height: 1.5; }
.aiq-prev-item .meta { font-size: 11px; color: var(--aiq-muted); margin-top: 6px; display: flex; gap: 12px; }

/* Plan step row */
.aiq-step {
  display: grid; grid-template-columns: 36px 1fr; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--aiq-border);
  animation: fadeUp .5s var(--ease) backwards;
}
.aiq-step:last-child { border-bottom: 0; }
.aiq-step .num {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(99,102,241,.14);
  border: 1px solid rgba(99,102,241,.3);
  display: grid; place-items: center;
  color: var(--aiq-accent-2);
  font-weight: 700;
  font-size: 13px;
}
.aiq-step .body h4 { font-size: 13.5px; font-weight: 700; margin: 0 0 4px; color: var(--aiq-text); }
.aiq-step .body p { font-size: 13px; color: var(--aiq-muted); margin: 0; line-height: 1.5; }
.aiq-step .body .meta {
  font-size: 11px; color: var(--aiq-faint); margin-top: 6px;
  display: flex; gap: 14px; flex-wrap: wrap;
}

/* Finding row */
.aiq-finding {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  padding: 16px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--aiq-border);
  border-left-width: 3px;
  border-radius: 10px;
  animation: fadeUp .5s var(--ease) backwards;
}
.aiq-finding[data-sev="critical"] { border-left-color: #ef4444; }
.aiq-finding[data-sev="high"]     { border-left-color: #f97316; }
.aiq-finding[data-sev="medium"]   { border-left-color: #eab308; }
.aiq-finding[data-sev="low"]      { border-left-color: #22c55e; }
.aiq-finding .ico {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 14px;
  font-weight: 800;
}
.aiq-finding[data-sev="critical"] .ico { background: rgba(239,68,68,.15); color: #fca5a5; }
.aiq-finding[data-sev="high"]     .ico { background: rgba(249,115,22,.15); color: #fdba74; }
.aiq-finding[data-sev="medium"]   .ico { background: rgba(234,179,8,.15); color: #fde047; }
.aiq-finding[data-sev="low"]      .ico { background: rgba(34,197,94,.15); color: #86efac; }
.aiq-finding .body h4 { font-size: 13.5px; font-weight: 700; margin: 0 0 4px; color: var(--aiq-text); }
.aiq-finding .body p { font-size: 13px; color: var(--aiq-muted); margin: 0; line-height: 1.5; }
.aiq-finding .body .jurs { margin-top: 6px; display: flex; gap: 6px; font-size: 16px; }

/* ──────────────────────────────────────────────────────────────
   SETTINGS
   ────────────────────────────────────────────────────────────── */
.aiq-setting {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--aiq-border);
  gap: 16px;
}
.aiq-setting:last-child { border-bottom: 0; }
.aiq-setting .meta-l { flex: 1; min-width: 0; }
.aiq-setting .nm { font-weight: 600; color: var(--aiq-text); font-size: 14px; }
.aiq-setting .ds { font-size: 12px; color: var(--aiq-muted); margin-top: 2px; }

.aiq-switch {
  width: 42px; height: 24px;
  background: rgba(255,255,255,.1);
  border: 1px solid var(--aiq-border-2);
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  transition: all .15s var(--ease);
  flex-shrink: 0;
}
.aiq-switch::after {
  content: ""; position: absolute;
  width: 18px; height: 18px;
  background: var(--aiq-muted);
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: all .15s var(--ease);
}
.aiq-switch[data-on="true"] {
  background: var(--aiq-accent);
  border-color: var(--aiq-accent);
}
.aiq-switch[data-on="true"]::after {
  background: #fff;
  left: calc(100% - 21px);
}

/* ──────────────────────────────────────────────────────────────
   FOOTER
   ────────────────────────────────────────────────────────────── */
.aiq-footer {
  margin-top: 36px;
  padding-top: 18px;
  border-top: 1px solid var(--aiq-border);
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--aiq-faint);
}

/* ──────────────────────────────────────────────────────────────
   RESPONSIVE
   ────────────────────────────────────────────────────────────── */
.aiq-menu-btn {
  display: none;
  width: 36px; height: 36px;
  border-radius: 9px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--aiq-border);
  color: var(--aiq-text);
  display: none;
  place-items: center;
}
.aiq-scrim {
  display: none;
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 19;
  backdrop-filter: blur(2px);
}
.aiq-scrim.open { display: block; }

@media (max-width: 900px) {
  .aiq-app { grid-template-columns: 1fr; }
  .aiq-sidebar {
    position: fixed; top: 0; left: 0;
    width: 280px; z-index: 20;
    transform: translateX(-110%);
    transition: transform .2s var(--ease);
  }
  .aiq-sidebar.open { transform: translateX(0); }
  .aiq-menu-btn { display: grid; }
  .aiq-topbar { padding: 12px 16px; }
  .aiq-page { padding: 18px 16px 60px; }
  .aiq-search { display: none; }
  .aiq-page-head { flex-direction: column; align-items: flex-start; }
}

</style>

  <script type="text/babel" data-presets="react">// globe.jsx — Real rotating Earth.
// A genuine 3-D globe: a coarse world land-mask is sampled into lat/long
// points, rotated around the polar axis each frame, projected onto a sphere
// (front hemisphere only) and drawn as shaded dots over an ocean gradient.

const Globe = ({ size = 360 }) => {
  const ref = React.useRef(null);

  React.useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    ctx.scale(dpr, dpr);

    const cx = size / 2, cy = size / 2, R = size * 0.43;

    // Coarse equirectangular land mask. Each row = a 5° latitude band from
    // +90° (top) to −90°; entries are inclusive [col0, col1] longitude spans
    // on a 72-column grid (col 0 = −180°, 5° per col).
    const MASK = {
      2:  [[8,14],[26,30],[50,69]],
      3:  [[2,5],[7,22],[25,31],[46,70]],
      4:  [[1,24],[26,31],[35,40],[42,71]],
      5:  [[1,14],[17,25],[27,30],[33,44],[45,71]],
      6:  [[2,15],[19,26],[35,42],[43,71]],
      7:  [[3,16],[19,27],[32,33],[35,71]],
      8:  [[4,28],[33,71]],
      9:  [[5,27],[33,52],[54,71]],
      10: [[6,26],[32,37],[40,71]],
      11: [[7,25],[31,46],[47,70]],
      12: [[9,22],[30,53],[55,70]],
      13: [[11,20],[29,53],[55,70]],
      14: [[13,20],[30,52],[54,69]],
      15: [[15,21],[31,51],[55,68]],
      16: [[20,27],[32,50],[60,68]],
      17: [[21,30],[33,49],[60,69]],
      18: [[21,31],[34,48],[60,70]],
      19: [[21,32],[35,47],[61,69]],
      20: [[22,33],[36,46],[57,68]],
      21: [[23,33],[37,45],[57,68]],
      22: [[24,33],[38,45],[56,67]],
      23: [[25,32],[39,44],[57,66]],
      24: [[26,31],[40,43],[58,65]],
      25: [[27,30],[41,43],[60,63]],
      26: [[27,29],[68,70]],
      27: [[27,29]],
      28: [[27,28]],
      29: [[27,28]],
      32: [[4,67]],
      33: [[0,71]],
      34: [[0,71]],
    };

    const pts = [];
    for (const r in MASK) {
      const row = +r;
      for (const [c0, c1] of MASK[r]) {
        for (let c = c0; c <= c1; c += 0.5) {
          const lon = (-180 + c * 5 + 2.5) * Math.PI / 180;
          for (const sub of [-1.25, 1.25]) {
            const lat = (90 - row * 5 - 2.5 + sub) * Math.PI / 180;
            pts.push([lon, lat]);
          }
        }
      }
    }

    const tilt = 21 * Math.PI / 180;
    const ct = Math.cos(tilt), st = Math.sin(tilt);
    // light direction (top-left, toward viewer)
    const lx = -0.42, ly = 0.5, lz = 0.62;

    let raf, rot = -1.2, last = performance.now();

    const draw = (now) => {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      rot += dt * 0.32;
      ctx.clearRect(0, 0, size, size);

      // ocean sphere
      const og = ctx.createRadialGradient(cx - R * 0.34, cy - R * 0.4, R * 0.08, cx, cy, R);
      og.addColorStop(0, '#26336f');
      og.addColorStop(0.5, '#141f47');
      og.addColorStop(1, '#070b1c');
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = og;
      ctx.fill();
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = 'rgba(129,140,248,0.42)';
      ctx.stroke();

      // land dots
      for (let i = 0; i < pts.length; i++) {
        const lon = pts[i][0], lat = pts[i][1];
        const lam = lon + rot;
        const clat = Math.cos(lat);
        let x = clat * Math.sin(lam);
        let y = Math.sin(lat);
        let z = clat * Math.cos(lam);
        // axial tilt around X
        const y2 = y * ct - z * st;
        const z2 = y * st + z * ct;
        y = y2; z = z2;
        if (z <= 0.02) continue;            // front hemisphere only

        const sx = cx + R * x, sy = cy - R * y;
        const lf = Math.max(0, x * lx + y * ly + z * lz);   // diffuse light
        const shade = 0.32 + 0.68 * lf;
        const rr = Math.round(70 + 90 * shade);
        const gg = Math.round(95 + 110 * shade);
        const bb = Math.round(180 + 75 * shade);
        const alpha = (0.55 + 0.45 * z) * (z < 0.12 ? z / 0.12 : 1);
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5 * (0.55 + 0.55 * z), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rr},${gg},${bb},${alpha})`;
        ctx.fill();
      }

      // specular sheen
      const sg = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.34, 0, cx - R * 0.3, cy - R * 0.34, R * 0.85);
      sg.addColorStop(0, 'rgba(175,186,255,0.26)');
      sg.addColorStop(0.45, 'rgba(175,186,255,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fill();

      // limb darkening at the edge for roundness
      const lg = ctx.createRadialGradient(cx, cy, R * 0.7, cx, cy, R);
      lg.addColorStop(0, 'rgba(0,0,0,0)');
      lg.addColorStop(1, 'rgba(2,4,12,0.5)');
      ctx.fillStyle = lg;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fill();

      raf = requestAnimationFrame(draw);
    };

    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) { rot = -0.6; draw(performance.now()); }
    else raf = requestAnimationFrame(draw);

    return () => raf && cancelAnimationFrame(raf);
  }, [size]);

  return (
    <div className="aiq-globe" style={{ width: size, height: size }}>
      <canvas ref={ref} style={{ width: size, height: size, display: 'block' }} />
    </div>
  );
};

window.AIQ_Globe = Globe;

const AgentScreen = ({ lang, agentId, setRoute }) => {
  const t = useT(lang);
  const agent = window.AIQ.agents.find(a => a.id === agentId);
  const [subject, setSubject] = useState(window.AIQ.topics[0].id);
  const [scope, setScope] = useState("");
  const [jurs, setJurs] = useState(["ch", "sg"]);
  const [gen, setGen] = useState({ state: 'idle', progress: 0 });

  // Generated content state
  const [output, setOutput] = useState(null);

  const subjectObj = window.AIQ.topics.find(x => x.id === subject);

  const toggleJur = (id) => {
    setJurs(prev => prev.includes(id) ? prev.filter(j => j !== id) : [...prev, id]);
  };

  const start = () => {
    setGen({ state: 'running', progress: 0 });
    setOutput(null);
    // Fake progressive generation
    let p = 0;
    const tick = setInterval(() => {
      p += 8 + Math.random() * 14;
      if (p >= 100) {
        clearInterval(tick);
        setGen({ state: 'done', progress: 100 });
        // Populate sample output by agent
        if (agentId === 'agent1') {
          setOutput({ kind: 'framework', regs: window.AIQ.regulations.aml.filter(r => jurs.includes(r.jur)) });
        } else if (agentId === 'agent2') {
          setOutput({ kind: 'plan', steps: buildPlan(lang, subject, jurs) });
        } else {
          setOutput({ kind: 'report', findings: window.AIQ.findings });
        }
      } else {
        setGen({ state: 'running', progress: Math.min(p, 95) });
      }
    }, 280);
  };

  return (
    <div className="aiq-page">
      <div className="aiq-page-head">
        <div>
          <p className="aiq-sub" style={{ marginBottom: 6, color: agent.color, letterSpacing: '.1em', textTransform: 'uppercase', fontWeight: 700, fontSize: 11 }}>
            {agent.icon} {agentId.toUpperCase()}
          </p>
          <h1 className="aiq-h1">{t(agent.title_key)}</h1>
          <p className="aiq-sub">{t(agent.desc_key)}</p>
        </div>
        <div className="aiq-row">
          <span className="aiq-pill aiq-pill-green">
            <span className="dot" /> {t('api_key_set')}
          </span>
          <span className="aiq-pill aiq-pill-indigo">Claude Sonnet 4.5</span>
        </div>
      </div>

      <div className="aiq-gen-split">
        {/* Left — Input form */}
        <div className="aiq-card">
          <div className="aiq-card-head">
            <h2 className="aiq-h2">{lang === 'fr' ? 'Paramètres' : 'Parameters'}</h2>
          </div>

          <div className="aiq-field">
            <label>{t('audit_subject')}</label>
            <select className="aiq-select" value={subject} onChange={e => setSubject(e.target.value)}>
              {window.AIQ.topics.map(top => (
                <option key={top.id} value={top.id}>{top[lang]}</option>
              ))}
            </select>
          </div>

          <div className="aiq-field">
            <label>{t('audit_scope_opt')}</label>
            <textarea className="aiq-textarea"
                      placeholder={t('audit_scope_ph')}
                      value={scope}
                      onChange={e => setScope(e.target.value)} />
            <span className="hint">{lang === 'fr' ? '(optionnel)' : '(optional)'}</span>
          </div>

          <div className="aiq-field">
            <label>{t('jurisdiction')}</label>
            <div className="aiq-chip-grid">
              {window.AIQ.jurisdictions.map(j => (
                <button key={j.id}
                        className="aiq-chip-check"
                        data-checked={jurs.includes(j.id)}
                        onClick={() => toggleJur(j.id)}
                        type="button">
                  <span style={{ fontSize: 14 }}>{j.flag}</span>
                  {j[lang]}
                  <span className="check">{jurs.includes(j.id) ? '✓' : ''}</span>
                </button>
              ))}
            </div>
          </div>

          {agentId !== 'agent1' && (
            <div className="aiq-field">
              <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className="aiq-pill aiq-pill-green" style={{ padding: '2px 7px', fontSize: 9 }}>✓</span>
                {agentId === 'agent2' ? t('framework_ready') : t('plan_ready')}
              </label>
              <span className="hint" style={{fontSize: 12}}>
                {lang === 'fr' ? 'Sortie de l\'agent précédent disponible' : 'Previous agent output available'}
              </span>
            </div>
          )}

          <div style={{ display: 'flex', gap: 10, marginTop: 18 }}>
            <button className="aiq-btn aiq-btn-primary aiq-btn-lg"
                    style={{ flex: 1 }}

              {gen.state === 'running' ? (
                <React.Fragment>
                  {t('generating')}
                  <span className="aiq-typing">
                    <span /><span /><span />
                  </span>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <Icon name="sparkle" size={14} />

                {Math.round(gen.progress)}% · {lang === 'fr' ? 'analyse multi-juridictions…' : 'multi-jurisdiction analysis…'}
              </div>

        {/* Right — Output */}

                {agentId === 'agent2' && <button className="aiq-btn aiq-btn-ghost aiq-btn-sm"><Icon name="download" size={12} /> {t('download_pptx')}</button>}
                {agentId === 'agent2' && <button className="aiq-btn aiq-btn-ghost aiq-btn-sm"><Icon name="download" size={12} /> {t('download_xlsx')}</button>}
                {agentId === 'agent3' && <button className="aiq-btn aiq-btn-ghost aiq-btn-sm"><Icon name="download" size={12} /> {t('download_word')}</button>}
                {agentId === 'agent3' && <button className="aiq-btn aiq-btn-ghost aiq-btn-sm"><Icon name="download" size={12} /> {t('download_pdf')}</button>}
              </div>
            )}
          </div>

          {gen.state === 'idle' && (
            <div className="aiq-output-empty">
              <div className="ic">{agent.icon}</div>
              <div style={{ fontSize: 14, color: 'var(--aiq-text-2)', fontWeight: 600, marginBottom: 6 }}>
                {lang === 'fr' ? 'Aucune génération' : 'No generation yet'}
              </div>
              <div style={{ fontSize: 12, color: 'var(--aiq-muted)' }}>
                {lang === 'fr' ? 'Configurez les paramètres puis lancez l\'analyse.'

// Build a fake plan based on subject + jurisdictions
const buildPlan = (lang, subject, jurs) => {
  const STEPS_FR = [
    { h: "Cadrage du périmètre", p: "Délimiter les entités, processus et systèmes concernés." },
    { h: "Identification des risques", p: "Cartographier les risques inhérents au sujet d'audit." },
    { h: "Tests de conception des contrôles", p: "Évaluer l'adéquation des contrôles documentés." },
    { h: "Tests d'efficacité opérationnelle", p: "Échantillonnage de transactions et revue d'évidence." },
    { h: "Évaluation des écarts", p: "Quantifier les non-conformités et hiérarchiser." },
    { h: "Synthèse & recommandations", p: "Formaliser les constats et préparer le rapport exécutif." },
  ];
  const STEPS_EN = [
    { h: "Scope framing", p: "Define the entities, processes and systems in scope." },
    { h: "Risk identification", p: "Map inherent risks tied to the audit topic." },
    { h: "Control design testing", p: "Assess whether documented controls are adequate." },
    { h: "Operating effectiveness testing", p: "Transaction sampling and evidence review." },
    { h: "Gap assessment", p: "Quantify non-conformities and prioritise." },
    { h: "Synthesis & recommendations", p: "Formalise findings and prepare the executive report." },
  ];
  const list = lang === 'fr' ? STEPS_FR : STEPS_EN;
  return list.map((s, i) => ({
    n: i + 1, h: s.h, p: s.p,
    duration: lang === 'fr' ? `${2 + i} jours` : `${2 + i} days`,
    auditor: ['L. Brunner', 'M. Tanaka', 'A. Cheung'][i % 3],
  }));
};

const OutputView = ({ lang, output, subject, jurs, t }) => {
  if (output.kind === 'framework') {
    return (
      <div className="aiq-prev-list">
        <div style={{ fontSize: 12, color: 'var(--aiq-muted)', marginBottom: 8 }}>
          {output.regs.length} {lang === 'fr' ? 'textes applicables' : 'applicable texts'} · {subject}
        </div>
        {output.regs.map((r, i) => {
          const jur = window.AIQ.jurisdictions.find(x => x.id === r.jur);
          return (
            <div key={i} className="aiq-prev-item" style={{ animationDelay: `${i * 0.08}s` }}>
              <span className="jur-tag">{jur.flag} {jur.id.toUpperCase()}</span>
              <span className="code">{r.code}</span>
              <div className="ttl">{r[lang]}</div>
              <div className="meta">
                <span>{jur.regulator}</span>
                <span>{lang === 'fr' ? 'MàJ' : 'Updated'} : {r.updated}</span>
                <span className={`aiq-pill aiq-pill-${r.severity === 'critical' ? 'red' : r.severity === 'high' ? 'orange' : 'yellow'}`}
                      style={{padding: '1px 7px', fontSize: 9}}>
                  {t(r.severity)}
                </span>
              </div>
            </div>
          );
        })}
      </div>
    );
  }
  if (output.kind === 'plan') {
    return (
      <div>
        <div style={{ fontSize: 12, color: 'var(--aiq-muted)', marginBottom: 10 }}>
          {output.steps.length} {lang === 'fr' ? 'étapes' : 'steps'} · {subject}
        </div>
        {output.steps.map((s, i) => (
          <div key={s.n} className="aiq-step" style={{ animationDelay: `${i * 0.08}s` }}>
            <div className="num">{s.n}</div>
            <div className="body">
              <h4>{s.h}</h4>
              <p>{s.p}</p>
              <div className="meta">
                <span>⏱ {s.duration}</span>
                <span>👤 {s.auditor}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }
  if (output.kind === 'report') {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ fontSize: 12, color: 'var(--aiq-muted)', marginBottom: 8 }}>
          {output.findings.length} {lang === 'fr' ? 'constats' : 'findings'} · {subject}
        </div>
        {output.findings.map((f, i) => (
          <div key={i} className="aiq-finding" data-sev={f.sev} style={{ animationDelay: `${i * 0.08}s` }}>
            <div className="ico">{f.sev[0].toUpperCase()}</div>
            <div className="body">
              <h4>{f[`title_${lang}`]}</h4>
              <p>{f[`desc_${lang}`]}</p>
              <div className="jurs">
                {f.jur.map(jid => window.AIQ.jurisdictions.find(x => x.id === jid).flag)}
              </div>
            </div>
            <span className={`aiq-pill aiq-pill-${f.sev === 'critical' ? 'red' : f.sev === 'high' ? 'orange' : f.sev === 'medium' ? 'yellow' : 'green'}`}>
              {t(f.sev)}
            </span>
          </div>
        ))}
      </div>
    );
  }
  return null;
};

          <p className="aiq-sub" style={{marginBottom:6,color:'#a78bfa',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:700,fontSize:11}}>📊 {lang==='fr'?'RAPPORT D\'AUDIT':'AUDIT REPORT'}</p>
          <h1 className="aiq-h1">{lang==='fr'?'Rapport d\'audit':'Audit Report'}</h1>
          <p className="aiq-sub">{lang==='fr'?'Constats, recommandations et plan d\'action.':'Findings, recommendations and action plan.'}</p>
        </div>
        <ModeToggle mode={mode} setMode={setMode} lang={lang} />
      </div>

      <div className="aiq-gen-split">
        {/* Left */}
        <div className="aiq-card">
          <h2 className="aiq-h2" style={{marginBottom:16}}>{lang==='fr'?'Paramètres':'Parameters'}</h2>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
            <span className="aiq-entity-badge">{window.AIQ.entities.find(e=>e.id===entity)?.icon} {window.AIQ.entities.find(e=>e.id===entity)?.[lang]}</span>
            <span className="aiq-pill aiq-pill-indigo">{window.AIQ.topics.find(tp=>tp.id===topic)?.[lang]}</span>

          </div>
          <div className="aiq-field">
            <label>{lang==='fr'?'Type d\'entité':'Entity type'}</label>
            <select className="aiq-select" value={entity} onChange={e=>setEntity(e.target.value)}>
              {window.AIQ.entities.map(en=><option key={en.id} value={en.id}>{en.icon} {en[lang]}</option>)}

          </div>
          <div className="aiq-field">
            <label>{t('audit_subject')}</label>
            <select className="aiq-select" value={topic} onChange={e=>setTopic(e.target.value)}>
